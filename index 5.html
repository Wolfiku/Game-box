<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .headline {
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 1.2rem;
    }

    .headline span {
      color: #ffffff;
      opacity: 0.85;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #fff;
      margin: 0 auto 1.4rem auto;
      opacity: 0.3;
    }

    .handle {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #cccccc;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="headline">A new project is <span>coming soon</span></h1>
    <div class="divider"></div>
    <p class="handle">@wolfikuproduction</p>
  </div>
</body>
</html>
