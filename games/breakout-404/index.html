<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BREAKOUT 404</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--fg:#fff;--muted:rgba(255,255,255,.42);--faint:rgba(255,255,255,.18);--panel:rgba(255,255,255,.04);--border:rgba(255,255,255,.12);--gold:#ffcf52;--font1:'Share Tech Mono',monospace;--font2:'JetBrains Mono',monospace;--r:4px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:var(--font2);touch-action:none;-webkit-user-select:none;user-select:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .26s ease}
.screen.active{opacity:1;pointer-events:auto}
#screen-menu,#screen-mode,#screen-settings,#screen-online,#screen-challenges{background:#000}
.terminal-bg{position:absolute;inset:0;white-space:pre;overflow:hidden;padding:18px;font-size:11px;line-height:1.6;opacity:.16;filter:blur(2.8px);pointer-events:none;color:#fff;font-family:var(--font2)}
.menu-content,.mode-content,.settings-content,.online-content,.challenges-content{position:relative;z-index:2}
.menu-content{display:flex;flex-direction:column;align-items:center;gap:32px}
.menu-logo h1{font-family:var(--font1);font-size:clamp(2.4rem,8vw,5rem);letter-spacing:.15em;text-shadow:0 0 38px rgba(255,255,255,.15)}
.menu-logo .subtitle{font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--muted);margin-top:6px;text-align:center}
.label-sm{font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--muted);text-align:center}
.menu-buttons,.pause-btns,.go-btns,.cr-btns{display:flex;flex-direction:column;gap:8px;width:250px}
.menu-btn,.pause-btn,.go-btn,.cr-btn{padding:12px 20px;text-align:left;text-transform:uppercase;letter-spacing:.14em;font-size:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);border-radius:var(--r);color:rgba(255,255,255,.68);transition:.16s ease}
.menu-btn:hover,.pause-btn:hover,.go-btn:hover,.cr-btn:hover,.mode-card:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.35);color:#fff}
.menu-btn::before,.pause-btn::before,.go-btn::before,.cr-btn::before{content:'> ';color:rgba(255,255,255,.24)}
.mode-content{display:flex;flex-direction:column;align-items:center;gap:28px;padding:20px}
.mode-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.mode-card{width:210px;padding:24px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.03);border-radius:var(--r);transition:.16s ease;cursor:pointer}
.mode-card h3{font-family:var(--font1);font-size:15px;letter-spacing:.1em;margin-bottom:8px}
.mode-card p{font-size:11px;line-height:1.55;color:var(--muted)}
.back-btn{font-size:11px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase;transition:.15s ease}
.back-btn:hover{color:var(--muted)}
.settings-content{display:flex;flex-direction:column;gap:14px;width:min(340px,90vw)}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.settings-label{font-size:12px;color:rgba(255,255,255,.62);letter-spacing:.1em}
.settings-val{font-size:12px;color:#fff}
.toggle-btn{width:36px;height:20px;border:1px solid rgba(255,255,255,.22);border-radius:10px;background:rgba(255,255,255,.07);position:relative;transition:.16s ease;cursor:pointer;flex-shrink:0}
.toggle-btn::after{content:'';position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.5);transition:.16s ease}
.toggle-btn.on{background:rgba(255,255,255,.26)}.toggle-btn.on::after{left:18px;background:#fff}
.vol-slider{-webkit-appearance:none;appearance:none;width:110px;height:2px;background:rgba(255,255,255,.22);outline:none}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.online-status{font-size:12px;letter-spacing:.08em;color:var(--faint);border:1px solid rgba(255,255,255,.06);padding:16px 26px;border-radius:var(--r)}
.online-status span{color:rgba(255,255,255,.25)}
#screen-challenges{overflow:auto}
.challenges-content{display:flex;flex-direction:column;align-items:center;gap:20px;padding:28px 14px;max-width:1040px;width:100%}
.challenges-grid{display:grid;grid-template-columns:repeat(6,minmax(100px,1fr));gap:8px;width:100%}
.challenge-item{min-height:90px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02);border-radius:var(--r);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:4px;padding:8px;cursor:pointer;transition:.16s ease}
.challenge-item:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.33)}
.challenge-item.completed{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.28)}
.challenge-item.completed .ch-num{color:var(--gold)}
.challenge-item.locked{opacity:.28;pointer-events:none}
.ch-num{font-family:var(--font1);font-size:16px;color:rgba(255,255,255,.55)}
.ch-name{font-size:8px;line-height:1.3;color:rgba(255,255,255,.38);letter-spacing:.05em}
.ch-pts{font-size:8px;color:rgba(255,255,255,.22)}
#screen-game{background:#000;display:block;opacity:0;pointer-events:none}
#screen-game.active{opacity:1;pointer-events:auto}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
#hud{position:fixed;inset:0 0 auto 0;height:56px;display:flex;justify-content:space-between;align-items:flex-start;padding:12px 14px 0;z-index:20;pointer-events:none}
#hud-left{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
#hud-right{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
#btn-stop{pointer-events:auto;font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.36);padding:0}
#btn-stop:hover{color:rgba(255,255,255,.76)}
#life-display{font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.72);min-height:14px}
#score-display{font-family:var(--font1);font-size:20px;letter-spacing:.1em;color:rgba(255,255,255,.88);text-align:right}
#level-display{font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.36);text-align:right;text-transform:uppercase}
#boss-bar-wrap{display:none;position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:21;width:min(320px,52vw);pointer-events:none;text-align:center}
#boss-bar-wrap.visible{display:block}
#boss-name{font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.32);margin-bottom:5px;text-transform:uppercase}
#boss-bar-bg{height:3px;background:rgba(255,255,255,.08);width:100%}
#boss-bar{height:3px;background:#fff;width:100%;transition:width .18s ease}
#ch-hud{display:none;position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:21;flex-direction:column;align-items:center;gap:4px;pointer-events:none}
#ch-hud.visible{display:flex}
#ch-hud-name{font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.3);text-transform:uppercase}
#ch-hud-mod{font-size:9px;border:1px solid rgba(255,255,255,.1);padding:2px 7px;border-radius:2px;color:rgba(255,255,255,.22);letter-spacing:.08em}
#item-popup{position:fixed;left:50%;bottom:82px;transform:translateX(-50%);z-index:22;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.62);opacity:0;transition:opacity .3s ease;pointer-events:none;white-space:nowrap}
#item-popup.visible{opacity:1}
#active-items{position:fixed;left:50%;transform:translateX(-50%);bottom:56px;display:flex;gap:6px;z-index:22;pointer-events:none}
.ai-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.42);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.9}}
#drag-zone{position:fixed;left:0;right:0;bottom:0;height:35vh;z-index:19;touch-action:none}
#pause-overlay,#gameover-overlay,#challenge-result{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:40;opacity:0;pointer-events:none;transition:opacity .22s ease}
#pause-overlay.visible,#gameover-overlay.visible,#challenge-result.visible{opacity:1;pointer-events:auto}
.overlay-content{display:flex;flex-direction:column;align-items:center;gap:18px;padding:20px}
.go-title,.cr-ch-name{font-family:var(--font1);font-size:clamp(1.4rem,5vw,2.8rem);letter-spacing:.15em;text-align:center}
.go-sub{font-size:12px;letter-spacing:.18em;color:rgba(255,255,255,.38);text-align:center}
.go-ram{color:var(--gold);font-size:12px;letter-spacing:.22em;text-align:center}
#checkpoint-notice{font-size:11px;letter-spacing:.18em;color:var(--gold);text-align:center;display:none}
@media(max-width:860px){.challenges-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:560px){.menu-buttons,.pause-btns,.go-btns,.cr-btns{width:220px}.challenges-grid{grid-template-columns:repeat(3,1fr)}.menu-logo h1{font-size:2.2rem}.mode-cards{gap:10px}.mode-card{width:min(260px,84vw)}}
</style>
</head>
