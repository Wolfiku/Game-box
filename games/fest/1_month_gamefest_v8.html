<script>
const API_BASE = 'https://gameboxsaves.db.scoodol.de';
const GAME_ID = '1month-gamefest';
const BOARD_KEY = 'alltime';
const FEST_START = new Date('2026-07-24T08:30:00+02:00');

const screens = { main: mainMenu, info: infoScreen, rank: rankScreen, game: gameScreen };
function show(n){ Object.values(screens).forEach(s => s.classList.add('hidden')); screens[n].classList.remove('hidden'); }
btnPlay.onclick = ()=>{ show('game'); startGame(); };
btnInfo.onclick = ()=>show('info');
btnBackFromInfo.onclick = ()=>show('main');
btnRank.onclick = ()=>{ show('rank'); loadLeaderboard(); };
btnBackFromRank.onclick = ()=>show('main');
btnRefreshRank.onclick = loadLeaderboard;
btnToMenu.onclick = ()=>{ gameOverBox.classList.add('hidden'); show('main'); };
btnRetry.onclick = ()=>{ gameOverBox.classList.add('hidden'); startGame(); };

let auth = JSON.parse(localStorage.getItem('gf_auth') || 'null');
function saveAuth(data){ auth = data; localStorage.setItem('gf_auth', JSON.stringify(data)); renderAccountInfo(); }
function isAccount(){ return auth?.type === 'account' && auth.account_id && auth.account_key; }
function isConsole(){ return auth?.type === 'console' && auth.console_key; }
function renderAccountInfo(){
  if(!auth) accountInfo.textContent = 'Kein Account geladen';
  else if(isAccount()) accountInfo.textContent = `Account: ${auth.username} | ID: ${auth.account_id}`;
  else if(isConsole()) accountInfo.textContent = `Console: ${auth.username} | Key: ${auth.console_key} (keine Saves)`;
  else accountInfo.textContent = 'Ungültige Auth-Daten';
}
async function ensureAuth(){
  try{ const stored = JSON.parse(localStorage.getItem('gf_auth') || 'null'); if(stored?.type === 'account' && stored.account_id && stored.account_key && stored.username){ auth = stored; renderAccountInfo(); return true; } if(stored?.type === 'console' && stored.console_key && stored.username){ auth = stored; renderAccountInfo(); return true; } }catch{}
  try{ const r = await fetch(API_BASE + '/api/account/me', { credentials:'include' }); if(r.ok){ const d = await r.json(); if(d.account_id && d.account_key && d.username){ saveAuth({type:'account', ...d}); return true; } } }catch{}
  try{ const r = await fetch(API_BASE + '/api/console/me', { credentials:'include' }); if(r.ok){ const d = await r.json(); if(d.console_key && d.username){ saveAuth({type:'console', ...d}); return true; } } }catch{}
  auth = null; renderAccountInfo(); return false;
}
renderAccountInfo(); ensureAuth();

function updateCountdown(){
  const now = new Date(); const diff = FEST_START - now; const st = cdStatusText;
  if(diff <= 0){ const weekEnd = new Date(FEST_START.getTime() + 14 * 864e5); st.textContent = now < weekEnd ? `Das Game-Fest läuft JETZT! Noch ${Math.ceil((weekEnd - now) / 36e5)} Stunden übrig.` : 'Das Game-Fest ist vorbei.'; cdDays.textContent = 0; cdHours.textContent = 0; cdMins.textContent = 0; cdSecs.textContent = 0; return; }
  st.textContent = 'Bis zum Start des Game-Fests:'; let r = diff; let d = Math.floor(r / 864e5); r -= d * 864e5; let h = Math.floor(r / 36e5); r -= h * 36e5; let m = Math.floor(r / 6e4); r -= m * 6e4; let s = Math.floor(r / 1000);
  cdDays.textContent = d; cdHours.textContent = String(h).padStart(2,'0'); cdMins.textContent = String(m).padStart(2,'0'); cdSecs.textContent = String(s).padStart(2,'0');
}
setInterval(updateCountdown, 1000); updateCountdown();

async function ensureBoard(){ try{ await fetch(API_BASE + '/api/leaderboard/create', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ game_id: GAME_ID, board_key: BOARD_KEY, label: '1 Month Game Fest - Bestzeit', sort_order: 'DESC' }) }); }catch{} }
ensureBoard();

async function submitScore(score){
  submitStatus.textContent = 'Sende Score...';
  try{
    if(!auth) throw new Error('Keine Auth');
    const body = { username: auth.username, game_id: GAME_ID, board_key: BOARD_KEY, score: Math.round(score * 10) / 10 };
    if(isAccount()){ body.account_id = auth.account_id; body.account_key = auth.account_key; }
    else if(isConsole()){ body.console_key = auth.console_key; }
    else throw new Error('Ungültiger Auth-Typ');
    const res = await fetch(API_BASE + '/api/leaderboard/submit', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    submitStatus.textContent = res.ok ? 'Score erfolgreich eingereicht!' : 'Fehler beim Einreichen.';
  }catch{ submitStatus.textContent = 'Score konnte nicht gesendet werden.'; }
}

async function loadLeaderboard(){
  rankStatus.textContent = 'Lade Rangliste...'; rankBody.innerHTML = '';
  try{ const res = await fetch(API_BASE + `/api/leaderboard/${GAME_ID}/${BOARD_KEY}/top?limit=10`); const data = await res.json(); if(!data.entries || !data.entries.length){ rankStatus.textContent = 'Noch keine Einträge — sei der Erste!'; return; } rankStatus.textContent = ''; data.entries.forEach((e,i)=>{ const tr = document.createElement('tr'); tr.innerHTML = `<td>${i+1}</td><td>${escapeHtml(e.username)}</td><td>${Number(e.score).toFixed(1)}s</td>`; rankBody.appendChild(tr); }); }catch{ rankStatus.textContent = 'Rangliste konnte nicht geladen werden.'; }
}
function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function saveGameData(data){ if(!isAccount()) return; try{ await fetch(API_BASE + '/api/save/set', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ account_id: auth.account_id, account_key: auth.account_key, game_id: GAME_ID, data }) }); }catch{} }
async function loadGameData(){ if(!isAccount()) return null; try{ const res = await fetch(API_BASE + '/api/save/get', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ account_id: auth.account_id, account_key: auth.account_key, game_id: GAME_ID }) }); if(!res.ok) return null; const d = await res.json(); return d.data ?? null; }catch{ return null; } }

const canvas = gameCanvas, ctx = canvas.getContext('2d'); let W, H;
function resizeCanvas(){ W = canvas.width = Math.min(innerWidth, 900); H = canvas.height = innerHeight; }
addEventListener('resize', resizeCanvas); resizeCanvas();

let player, attacks, gameRunning, startTime, lastSpawn, elapsed, difficultyLevel, animId, pointerActive=false, pointerX=0, pointerY=0;
function startGame(){ resizeCanvas(); player = {x:W/2, y:H/2, r:14, speed:320}; attacks = []; keys = {}; gameRunning = true; startTime = performance.now(); lastSpawn = 0; elapsed = 0; difficultyLevel = 1; gameOverBox.classList.add('hidden'); hudScore.textContent='0.0'; hudLevel.textContent='1'; if(animId) cancelAnimationFrame(animId); let last = performance.now(); const loop = now => { if(!gameRunning) return; const dt = Math.min((now-last)/1000,0.05); last = now; elapsed = (now-startTime)/1000; difficultyLevel = 1 + Math.floor(elapsed); update(dt); draw(); animId = requestAnimationFrame(loop); }; animId = requestAnimationFrame(loop); }
function spawnAttack(kind){ const speed = 90 + difficultyLevel*22, size = 8 + Math.random()*10, side = Math.floor(Math.random()*4); let x,y,vx,vy,color; if(kind===2){ x=Math.random()*W; y=Math.random()<.5?-size:H+size; vx=(Math.random()-.5)*60; vy=y<0?speed:-speed; color='#7cff6b'; } else if(kind===1){ x=Math.random()<.5?-size:W+size; y=Math.random()*H; vx=x<0?speed:-speed; vy=(Math.random()-.5)*60; color='#ffb84d'; } else { if(side===0){x=Math.random()*W;y=-size;vx=(Math.random()-.5)*40;vy=speed}else if(side===1){x=W+size;y=Math.random()*H;vx=-speed;vy=(Math.random()-.5)*40}else if(side===2){x=Math.random()*W;y=H+size;vx=(Math.random()-.5)*40;vy=-speed}else{x=-size;y=Math.random()*H;vx=speed;vy=(Math.random()-.5)*40} color='#ff4d7d'; } attacks.push({x,y,vx,vy,r:size,kind,color}); }
function update(dt){ let dx=0, dy=0; if(pointerActive){ const ddx=pointerX-player.x, ddy=pointerY-player.y, dist=Math.hypot(ddx,ddy); if(dist>1){ const follow = Math.min(1, dt*18); dx=(ddx/dist)*follow; dy=(ddy/dist)*follow; } } const l=Math.hypot(dx,dy); if(l>0){ dx/=l; dy/=l; } player.x = Math.max(player.r, Math.min(W-player.r, player.x + dx*player.speed*dt*2.4)); player.y = Math.max(player.r, Math.min(H-player.r, player.y + dy*player.speed*dt*2.4)); const interval = Math.max(0.86-difficultyLevel*0.05,0.08); lastSpawn += dt; if(lastSpawn>=interval){ lastSpawn=0; spawnAttack(difficultyLevel>=4?Math.floor(Math.random()*3)+1:0); if(difficultyLevel>6 && Math.random()<0.6) spawnAttack(Math.floor(Math.random()*3)+1); } for(let i=attacks.length-1;i>=0;i--){ const a=attacks[i]; a.x+=a.vx*dt; a.y+=a.vy*dt; if(a.x<-80||a.x>W+80||a.y<-80||a.y>H+80){ attacks.splice(i,1); continue; } if(Math.hypot(a.x-player.x,a.y-player.y)<a.r+player.r){ endGame(); return; } } hudScore.textContent=elapsed.toFixed(1); hudLevel.textContent=difficultyLevel; }
function draw(){ ctx.clearRect(0,0,W,H); const g = ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,Math.max(W,H)/1.2); g.addColorStop(0,'#131a31'); g.addColorStop(1,'#06090f'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); attacks.forEach(a=>{ ctx.shadowColor=a.color; ctx.shadowBlur=10; ctx.fillStyle=a.color; ctx.beginPath(); ctx.arc(a.x,a.y,a.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; }); ctx.strokeStyle='rgba(63,215,255,.55)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(player.x,player.y,player.r+4,0,Math.PI*2); ctx.stroke(); ctx.fillStyle='#3fd7ff'; ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2); ctx.fill(); }
function endGame(){ gameRunning=false; cancelAnimationFrame(animId); finalScore.textContent=elapsed.toFixed(1)+'s'; submitStatus.textContent=''; gameOverBox.classList.remove('hidden'); submitScore(elapsed); }
addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true); addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false); function pos(x,y){const r=canvas.getBoundingClientRect(); return {x:x-r.left,y:y-r.top};}
canvas.addEventListener('pointerdown',e=>{ pointerActive=true; const p=pos(e.clientX,e.clientY); pointerX=p.x; pointerY=p.y; });
canvas.addEventListener('pointermove',e=>{ if(pointerActive){ const p=pos(e.clientX,e.clientY); pointerX=p.x; pointerY=p.y; } });
canvas.addEventListener('pointerup',()=>pointerActive=false); canvas.addEventListener('pointerleave',()=>pointerActive=false); show('main');
</script>
