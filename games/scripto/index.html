<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRIPTO</title>
<style>
:root{
  --ink:#201d1d;--ink-deep:#0f0000;--canvas:#fdfcfc;--surface-soft:#f8f7f7;
  --surface-card:#f1eeee;--surface-dark:#201d1d;--hairline:rgba(15,0,0,0.12);
  --hairline-strong:#646262;--on-dark:#fdfcfc;--on-dark-mute:#9a9898;
  --ash:#9a9898;--mute:#646262;--danger:#ff3b30;--success:#30d158;
  --running:#8b5cf6;--font-mono:'IBM Plex Mono','JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--canvas);color:var(--ink);font-family:var(--font-mono);font-size:16px;line-height:1.5;}
.primary-nav{height:56px;display:flex;align-items:center;gap:24px;padding:0 16px;border-bottom:1px solid var(--hairline);background:var(--canvas);}
.wordmark{font-weight:700;font-size:16px;letter-spacing:1px;}
.nav-links{display:flex;gap:16px;font-size:14px;color:var(--mute);flex:1;flex-wrap:wrap;}
.nav-links span{white-space:nowrap;}
#stat-ram{color:var(--running);}
#stat-money{color:var(--success);font-weight:500;}
.button-primary{background:var(--ink);color:var(--on-dark);font-family:var(--font-mono);font-size:14px;font-weight:500;border:none;border-radius:4px;padding:6px 16px;height:36px;cursor:pointer;}
.button-primary:active{background:var(--ink-deep);}
.button-secondary{background:var(--canvas);color:var(--ink);font-family:var(--font-mono);font-size:13px;font-weight:500;border:1px solid var(--hairline-strong);border-radius:4px;padding:4px 12px;cursor:pointer;}
.badge-section-label{font-weight:700;font-size:14px;padding:8px 12px;border-bottom:1px solid var(--hairline);}
.workspace{display:grid;grid-template-columns:240px 1fr 320px;height:calc(100vh - 56px - 48px);}
.panel{border-right:1px solid var(--hairline);display:flex;flex-direction:column;overflow:hidden;}
.terminal-panel{border-right:none;}
.panel-actions{display:flex;gap:6px;padding:8px 12px;flex-wrap:wrap;}
.panel-actions button{font-size:11px;padding:3px 8px;}
.file-tree{overflow-y:auto;padding:4px 12px;flex:1;font-size:14px;}
.file-row{display:flex;justify-content:space-between;align-items:center;padding:4px;cursor:pointer;border-radius:4px;}
.file-row:hover{background:var(--surface-soft);}
.file-row.active{background:var(--surface-card);}
.file-row .fname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-row .fmeta{font-size:11px;color:var(--ash);}
.folder-row{font-weight:500;}
.folder-children{padding-left:14px;border-left:1px dashed var(--hairline);}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.status-idle{background:var(--ash);}
.status-running{background:var(--running);}
.status-done{background:var(--success);}
.status-error{background:var(--danger);}
.editor-panel{position:relative;}
#editor-filename{font-weight:700;}
.editor-wrap{flex:1;display:flex;position:relative;overflow:hidden;font-size:14px;}
.line-gutter{width:34px;background:var(--surface-soft);color:var(--ash);padding:12px 6px 12px 0;text-align:right;font-size:13px;line-height:1.6;user-select:none;overflow:hidden;}
#code-editor{flex:1;border:none;outline:none;resize:none;font-family:var(--font-mono);font-size:14px;line-height:1.6;padding:12px;background:var(--canvas);color:var(--ink);}
.autocomplete-box{position:absolute;background:var(--surface-card);border:1px solid var(--hairline-strong);border-radius:4px;font-size:13px;z-index:20;max-height:160px;overflow-y:auto;}
.autocomplete-item{padding:4px 10px;cursor:pointer;}
.autocomplete-item:hover,.autocomplete-item.sel{background:var(--surface-dark);color:var(--on-dark);}
.editor-actions{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--hairline);}
.hint{font-size:11px;color:var(--ash);margin-left:auto;}
.terminal-output{flex:1;overflow-y:auto;background:var(--surface-dark);color:var(--on-dark);font-size:13px;padding:10px 12px;}
.term-line{margin-bottom:2px;white-space:pre-wrap;word-break:break-word;}
.term-running{color:var(--running);}
.term-done{color:var(--success);}
.term-error{color:#ff6b60;}
.term-info{color:var(--on-dark-mute);}
.modal-overlay{position:fixed;inset:0;background:rgba(15,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal-card{background:var(--canvas);border-radius:4px;width:420px;max-height:80vh;overflow-y:auto;border:1px solid var(--hairline-strong);}
#shop-items{padding:8px 12px;}
.shop-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--hairline);font-size:14px;}
.shop-row button{font-size:12px;}
.inp-modal{position:fixed;inset:0;background:rgba(15,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:200;}
.inp-box{background:var(--canvas);border:1px solid var(--hairline-strong);border-radius:4px;padding:20px 24px;width:300px;}
.inp-box label{display:block;font-size:13px;font-weight:600;margin-bottom:8px;}
.inp-box input{width:100%;font-family:var(--font-mono);font-size:14px;padding:6px 10px;border:1px solid var(--hairline-strong);border-radius:4px;background:var(--surface-soft);outline:none;}
.inp-box input:focus{border-color:var(--running);}
.inp-btn-row{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
.footer-section{height:48px;display:flex;align-items:center;justify-content:center;border-top:1px solid var(--hairline);color:var(--mute);font-size:12px;}
</style>
</head>
<body>
<nav class="primary-nav">
  <div class="wordmark">[SCRIPTO]</div>
  <div class="nav-links">
    <span id="stat-storage">STOR 0.2/5.0MB</span>
    <span id="stat-ram">RAM 0/1MB</span>
    <span id="stat-tick">TICK 1000ms</span>
    <span id="stat-money">$ 0</span>
  </div>
  <button class="button-primary" id="btn-shop">[+] SHOP</button>
</nav>
<main class="workspace">
  <section class="panel files-panel">
    <div class="badge-section-label">[FILES]</div>
    <div class="panel-actions">
      <button class="button-secondary" id="btn-new-script">[+] script</button>
      <button class="button-secondary" id="btn-new-folder">[+] folder</button>
      <button class="button-secondary" id="btn-new-save">[+] save</button>
    </div>
    <div id="file-tree" class="file-tree"></div>
  </section>
  <section class="panel editor-panel">
    <div class="badge-section-label" id="editor-filename">[EDITOR] server.code</div>
    <div class="editor-wrap">
      <div id="line-gutter" class="line-gutter"></div>
      <textarea id="code-editor" spellcheck="false" autocomplete="off"></textarea>
      <div id="autocomplete-box" class="autocomplete-box" style="display:none;"></div>
    </div>
    <div class="editor-actions">
      <button class="button-primary" id="btn-run">[RUN]</button>
      <button class="button-secondary" id="btn-stop">[STOP]</button>
      <span class="hint">Tab = Autocomplete</span>
    </div>
  </section>
  <section class="panel terminal-panel">
    <div class="badge-section-label">[TERMINAL]</div>
    <div id="terminal-output" class="terminal-output"></div>
  </section>
</main>
<div id="shop-modal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <div class="badge-section-label">[SHOP]</div>
    <div id="shop-items"></div>
    <div style="padding:8px 12px;"><button class="button-secondary" id="btn-close-shop">[x] close</button></div>
  </div>
</div>
<div id="inp-modal" class="inp-modal" style="display:none;">
  <div class="inp-box">
    <label id="inp-label">Name:</label>
    <input id="inp-input" type="text" autocomplete="off" />
    <div class="inp-btn-row">
      <button class="button-secondary" id="inp-cancel">[x] cancel</button>
      <button class="button-primary" id="inp-ok">[ok]</button>
    </div>
  </div>
</div>
<footer class="footer-section"><span>scripto.local -- terminal crypto-mining puzzle</span></footer>
<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
function askUser(label, def) {
  return new Promise(res => {
    const m = document.getElementById('inp-modal');
    const i = document.getElementById('inp-input');
    const l = document.getElementById('inp-label');
    l.textContent = label;
    i.value = def || '';
    m.style.display = 'flex';
    setTimeout(() => { i.focus(); i.select(); }, 50);
    const done = v => { m.style.display = 'none'; res(v); };
    document.getElementById('inp-ok').onclick = () => done(i.value.trim() || null);
    document.getElementById('inp-cancel').onclick = () => done(null);
    i.onkeydown = e => {
      if (e.key === 'Enter') done(i.value.trim() || null);
      if (e.key === 'Escape') done(null);
    };
  });
}

function r1(n) { return Math.round(n * 100) / 100; }

// ── State ────────────────────────────────────────────────────────────────────
const state = {
  money: 0, storageMax: 5.0, ramMax: 1.0,
  ramSpeedTier: 1, tickMs: 1000, saveSlots: 1,
  files: {}, rootOrder: [], activeFileId: null,
  nextId: 1, tickCount: 0
};
const TICK_MS = { 1: 1000, 2: 500, 3: 200 };

function nid(p) { return p + (state.nextId++); }

function mkFile(name, type, pid, content) {
  const id = nid('f');
  const f = {
    id, name, type, parentId: pid,
    children: type === 'folder' ? [] : null,
    content: content || '', status: 'idle',
    currentLine: -1, pc: 0, program: null,
    collected: 0, saveAmount: 0,
    compressed: false, extracted: true, running: false
  };
  state.files[id] = f;
  if (pid) state.files[pid].children.push(id);
  else state.rootOrder.push(id);
  return f;
}

function fsz(f) {
  if (f.type === 'folder') return 0;
  const l = (f.content.match(/\n/g) || []).length + (f.content.length ? 1 : 0);
  return r1(0.1 + 0.1 * l);
}
function totalStor() {
  let t = 0;
  for (const id in state.files) t += fsz(state.files[id]);
  return r1(t);
}
function totalRam() {
  let t = 0;
  for (const id in state.files) if (state.files[id].running) t += 1;
  return r1(t);
}
function cntSave() {
  return Object.values(state.files).filter(f => f.type === 'save').length;
}

// ── Initial file ─────────────────────────────────────────────────────────────
const sf = mkFile('server.code', 'script', null,
  'repeat infinite\n  when collectable: collect\n  when storage.dat exists and collected >= 10: save storage.dat\n');
state.activeFileId = sf.id;

// ── Parser ───────────────────────────────────────────────────────────────────
function parse(src) {
  const lines = src.split('\n');
  function ind(l) { return l.match(/^\s*/)[0].length; }
  function blk(si, idx) {
    const b = { type: 'block', children: [] };
    while (idx < lines.length) {
      const raw = lines[idx];
      if (raw.trim() === '') { idx++; continue; }
      const i = ind(raw);
      if (i < si) break;
      const tr = raw.trim();
      if (tr.startsWith('repeat')) {
        const m = tr.match(/^repeat\s+(infinite|\d+)/);
        const c = m ? (m[1] === 'infinite' ? Infinity : +m[1]) : Infinity;
        const node = { type: 'repeat', count: c, lineNo: idx, children: [] };
        idx++;
        const inner = blk(i + 1, idx);
        node.children = inner.b.children;
        idx = inner.idx;
        b.children.push(node);
      } else if (tr.startsWith('when')) {
        const m = tr.match(/^when\s+(.+?):\s*(.+)$/);
        b.children.push(m
          ? { type: 'when', cond: m[1].trim(), action: m[2].trim(), lineNo: idx }
          : { type: 'error', msg: 'Syntax error', lineNo: idx });
        idx++;
      } else {
        b.children.push({ type: 'action', action: tr, lineNo: idx });
        idx++;
      }
    }
    return { b, idx };
  }
  return { type: 'block', children: blk(0, 0).b.children };
}

function flatten(ast) {
  const s = [];
  function w(n) {
    if (n.type === 'block') { n.children.forEach(w); return; }
    if (n.type === 'repeat') {
      s.push({ type: 'rs', count: n.count, lineNo: n.lineNo });
      n.children.forEach(w);
      s.push({ type: 're', lineNo: n.lineNo });
      return;
    }
    s.push(n);
  }
  w(ast);
  return s;
}

// ── Eval ─────────────────────────────────────────────────────────────────────
function findF(name, pid) {
  const ids = pid ? state.files[pid].children : state.rootOrder;
  for (const id of ids) if (state.files[id].name === name) return state.files[id];
  return null;
}
function cmp(a, op, b) {
  return op === '>=' ? a >= b : op === '<=' ? a <= b : op === '>' ? a > b : op === '<' ? a < b : a === b;
}
function evalCond(cond, f) {
  cond = cond.trim();
  if (cond === 'collectable') return true;
  let m;
  if ((m = cond.match(/^(\S+)\s+exists$/))) return findF(m[1], f.parentId) !== null;
  if ((m = cond.match(/^collected\s*(>=|<=|>|<|==)\s*(\d+)$/))) return cmp(f.collected, m[1], +m[2]);
  if ((m = cond.match(/^storage\.dat\s+exists\s+and\s+collected\s*(>=|<=|>|<|==)\s*(\d+)$/)))
    return findF('storage.dat', f.parentId) !== null && cmp(f.collected, m[1], +m[2]);
  if ((m = cond.match(/^ram\s*(>=|<=|>|<|==)\s*([\d.]+)mb$/))) return cmp(state.ramMax, m[1], +m[2]);
  if ((m = cond.match(/^(\S+)\s+size\s*(>=|<=|>|<|==)\s*([\d.]+)mb$/))) {
    const t = findF(m[1], f.parentId);
    return t ? cmp(t.saveAmount, m[2], +m[3]) : false;
  }
  if (cond === 'extracted') return f.extracted;
  return false;
}
function execA(actionStr, f) {
  const p = actionStr.trim().split(/\s+/), cmd = p[0], arg = p[1];
  if (cmd === 'collect') {
    f.collected++;
    return { ok: true, log: 'collect() -> +1 (total ' + f.collected + ')' };
  }
  if (cmd === 'save') {
    const t = arg ? findF(arg, f.parentId) : null;
    if (!t) return { ok: false, log: "save: '" + arg + "' not found" };
    t.saveAmount += f.collected;
    const mv = f.collected;
    f.collected = 0;
    return { ok: true, log: 'save(' + arg + ') -> ' + mv + ' units (total ' + r1(t.saveAmount) + ')' };
  }
  if (cmd === 'compress') {
    const t = arg ? findF(arg, f.parentId) : null;
    if (!t) return { ok: false, log: "compress: '" + arg + "' not found" };
    t.compressed = true; t.extracted = false;
    return { ok: true, log: 'compress(' + arg + ') ok' };
  }
  if (cmd === 'extract') {
    const t = arg ? findF(arg, f.parentId) : null;
    if (!t) return { ok: false, log: "extract: '" + arg + "' not found" };
    t.extracted = true; f.extracted = true;
    return { ok: true, log: 'extract(' + arg + ') ok' };
  }
  if (cmd === 'convert') {
    const t = arg ? findF(arg, f.parentId) : null;
    if (!t) return { ok: false, log: "convert: '" + arg + "' not found" };
    if (state.ramMax < 5 && t.saveAmount > 50) return { ok: false, log: 'convert: needs >=5MB RAM' };
    const rate = t.compressed ? 10 : 1;
    const earned = r1(t.saveAmount * rate * 0.5);
    state.money += earned; t.saveAmount = 0; t.compressed = false;
    return { ok: true, log: 'convert(' + arg + ') -> +$' + earned + ' (x' + rate + ')' };
  }
  return { ok: false, log: 'Unknown: ' + cmd };
}

// ── Tick engine ──────────────────────────────────────────────────────────────
let tmr = null;

function startF(f) {
  try { f.program = flatten(parse(f.content)); }
  catch (e) { f.status = 'error'; log('[' + f.name + '] parse error: ' + e.message, 'error'); return; }
  f.pc = 0; f.running = true; f.status = 'running'; f.currentLine = -1;
  log('[' + f.name + '] started', 'info'); renderAll();
}
function stopF(f) {
  f.running = false; f.status = 'idle'; f.currentLine = -1;
  log('[' + f.name + '] stopped', 'info'); renderAll();
}
function tickF(f) {
  if (!f.running || !f.program) return;
  if (f.pc >= f.program.length) f.pc = 0;
  const s = f.program[f.pc];
  if (!s) { f.pc = 0; return; }
  if (s.type === 'rs' || s.type === 're') { f.pc++; if (f.pc >= f.program.length) f.pc = 0; return tickF(f); }
  f.currentLine = s.lineNo;
  if (s.type === 'when') {
    const ok = evalCond(s.cond, f);
    if (ok) { const r = execA(s.action, f); f.status = r.ok ? 'running' : 'error'; log('[' + f.name + '] L' + (s.lineNo + 1) + ': ' + r.log, r.ok ? 'done' : 'error'); }
    else log('[' + f.name + '] L' + (s.lineNo + 1) + ': cond=false', 'info');
  } else if (s.type === 'action') {
    const r = execA(s.action, f);
    log('[' + f.name + '] L' + (s.lineNo + 1) + ': ' + r.log, r.ok ? 'done' : 'error');
    f.status = r.ok ? 'running' : 'error';
  } else if (s.type === 'error') {
    log('[' + f.name + '] L' + (s.lineNo + 1) + ': ' + s.msg, 'error'); f.status = 'error';
  }
  f.pc++;
}
function tick() {
  state.tickCount++;
  for (const id in state.files) {
    const f = state.files[id];
    if (f.type === 'script' && f.running) tickF(f);
  }
  renderAll();
}
function reloop() {
  if (tmr) clearInterval(tmr);
  state.tickMs = TICK_MS[state.ramSpeedTier];
  tmr = setInterval(tick, state.tickMs);
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderTree() {
  const el = document.getElementById('file-tree');
  el.innerHTML = '';
  function rl(ids, c) {
    for (const id of ids) {
      const f = state.files[id];
      const row = document.createElement('div');
      row.className = 'file-row' + (f.type === 'folder' ? ' folder-row' : '') + (f.id === state.activeFileId ? ' active' : '');
      const sc = f.type === 'script' ? 'status-' + f.status : '';
      row.innerHTML =
        '<span class="fname">' + (f.type === 'folder' ? '[D] ' : '<span class="status-dot ' + sc + '"></span>') + f.name + '</span>' +
        '<span class="fmeta">' + (f.type !== 'folder' ? fsz(f) + 'MB' : '') + '</span>';
      row.onclick = () => selF(f.id);
      c.appendChild(row);
      if (f.type === 'folder') {
        const cw = document.createElement('div');
        cw.className = 'folder-children';
        c.appendChild(cw);
        rl(f.children, cw);
      }
    }
  }
  rl(state.rootOrder, el);
}

function selF(id) {
  state.activeFileId = id;
  const f = state.files[id];
  document.getElementById('editor-filename').textContent = '[EDITOR] ' + f.name;
  document.getElementById('code-editor').value = f.content;
  renderAll();
}

function renderGutter() {
  const ed = document.getElementById('code-editor');
  const g = document.getElementById('line-gutter');
  const lines = ed.value.split('\n');
  const f = state.files[state.activeFileId];
  let h = '';
  for (let i = 0; i < lines.length; i++) {
    let c = '';
    if (f && f.running && f.currentLine === i) c = 'color:#8b5cf6;font-weight:700;';
    else if (f && f.status === 'error' && f.currentLine === i) c = 'color:#ff3b30;font-weight:700;';
    h += '<div style="' + c + '">' + (i + 1) + '</div>';
  }
  g.innerHTML = h;
}

function renderAll() {
  document.getElementById('stat-storage').textContent = 'STOR ' + totalStor() + '/' + state.storageMax + 'MB';
  document.getElementById('stat-ram').textContent = 'RAM ' + totalRam() + '/' + state.ramMax + 'MB';
  document.getElementById('stat-tick').textContent = 'TICK ' + state.tickMs + 'ms (Tier ' + state.ramSpeedTier + ')';
  document.getElementById('stat-money').textContent = '$ ' + r1(state.money);
  renderTree();
  renderGutter();
}

function log(msg, kind) {
  const out = document.getElementById('terminal-output');
  const l = document.createElement('div');
  l.className = 'term-line term-' + kind;
  l.textContent = '[t' + state.tickCount + '] ' + msg;
  out.appendChild(l);
  while (out.children.length > 200) out.removeChild(out.firstChild);
  out.scrollTop = out.scrollHeight;
}

// ── Autocomplete ─────────────────────────────────────────────────────────────
const KW = ['repeat', 'infinite', 'when', 'collect', 'save', 'compress', 'extract', 'convert', 'collectable', 'exists', 'and', 'size', 'ram'];

function onInput(e) {
  const ed = e.target;
  state.files[state.activeFileId].content = ed.value;
  renderGutter();
  ac(ed);
}
function onKey(e) {
  const box = document.getElementById('autocomplete-box');
  if (e.key === 'Tab' && box.style.display !== 'none') {
    e.preventDefault();
    const s = box.querySelector('.autocomplete-item.sel') || box.querySelector('.autocomplete-item');
    if (s) applyAc(s.textContent);
  } else if (e.key === 'Escape') {
    box.style.display = 'none';
  } else if (e.key === 'Tab') {
    e.preventDefault();
    ins(e.target, '  ');
  }
}
function ins(el, txt) {
  const s = el.selectionStart;
  el.value = el.value.slice(0, s) + txt + el.value.slice(s);
  el.selectionStart = el.selectionEnd = s + txt.length;
  state.files[state.activeFileId].content = el.value;
  renderGutter();
}
function ac(ed) {
  const box = document.getElementById('autocomplete-box');
  const pos = ed.selectionStart;
  const m = (ed.value.slice(0, pos)).match(/[a-zA-Z_.]+$/);
  if (!m) { box.style.display = 'none'; return; }
  const frag = m[0].toLowerCase();
  const fnames = Object.values(state.files).filter(f => f.type !== 'folder').map(f => f.name);
  const opts = [...KW, ...fnames].filter(w => w.toLowerCase().startsWith(frag) && w.toLowerCase() !== frag);
  if (!opts.length) { box.style.display = 'none'; return; }
  box.innerHTML = opts.slice(0, 8).map((o, i) => '<div class="autocomplete-item' + (i === 0 ? ' sel' : '') + '">' + o + '</div>').join('');
  box.querySelectorAll('.autocomplete-item').forEach(it => { it.onclick = () => applyAc(it.textContent.trim()); });
  box.style.left = '12px'; box.style.top = '40px'; box.style.display = 'block';
}
function applyAc(word) {
  const ed = document.getElementById('code-editor');
  const pos = ed.selectionStart;
  const m = (ed.value.slice(0, pos)).match(/[a-zA-Z_.]+$/);
  const fl = m ? m[0].length : 0;
  const nv = ed.value.slice(0, pos - fl) + word + ed.value.slice(pos);
  ed.value = nv;
  ed.selectionStart = ed.selectionEnd = pos - fl + word.length;
  state.files[state.activeFileId].content = nv;
  document.getElementById('autocomplete-box').style.display = 'none';
  renderGutter();
}

// ── Shop ─────────────────────────────────────────────────────────────────────
const shopC = [
  { label: 'Storage +10MB', cost: 50, fn: () => { state.storageMax += 10; } },
  { label: 'RAM Capacity +1MB', cost: 100, fn: () => { state.ramMax += 1; } },
  { label: 'RAM Speed Tier up', cost: 500, fn: () => { if (state.ramSpeedTier < 3) { state.ramSpeedTier++; reloop(); } } },
  { label: 'Extra Save Slot', cost: 200, fn: () => { state.saveSlots++; } },
];
function openShop() {
  const c = document.getElementById('shop-items');
  c.innerHTML = '';
  shopC.forEach(item => {
    const row = document.createElement('div');
    row.className = 'shop-row';
    row.innerHTML = '<span>' + item.label + ' -- $' + item.cost + '</span>';
    const b = document.createElement('button');
    b.className = 'button-primary'; b.textContent = 'buy';
    b.onclick = () => {
      if (state.money >= item.cost) {
        state.money -= item.cost; item.fn();
        log('Bought: ' + item.label, 'done'); renderAll(); openShop();
      } else log('Not enough money.', 'error');
    };
    row.appendChild(b); c.appendChild(row);
  });
  document.getElementById('shop-modal').style.display = 'flex';
}
function closeShop() { document.getElementById('shop-modal').style.display = 'none'; }

// ── New file UI ───────────────────────────────────────────────────────────────
async function newFileUI(type) {
  const af = state.files[state.activeFileId];
  const pid = af && af.type === 'folder' ? af.id : (af ? af.parentId : null);
  const def = type === 'script' ? 'script' + state.nextId + '.code' : type === 'folder' ? 'folder' + state.nextId : 'storage' + state.nextId + '.dat';
  const name = await askUser('File name:', def);
  if (!name) return;
  if (type === 'save' && state.saveSlots <= cntSave()) { log('No free save slot.', 'error'); return; }
  if (totalStor() + 0.1 > state.storageMax && type !== 'folder') { log('Not enough storage!', 'error'); return; }
  const f = mkFile(name, type === 'save' ? 'save' : type, pid, type === 'script' ? 'repeat infinite\n  when collectable: collect\n' : '');
  renderAll(); selF(f.id);
}

// ── Boot — runs immediately, DOM is already ready ─────────────────────────────
(function init() {
  const ed = document.getElementById('code-editor');
  ed.value = state.files[state.activeFileId].content;
  ed.addEventListener('input', onInput);
  ed.addEventListener('keydown', onKey);
  ed.addEventListener('scroll', () => { document.getElementById('line-gutter').scrollTop = ed.scrollTop; });

  document.getElementById('btn-new-script').onclick = () => newFileUI('script');
  document.getElementById('btn-new-folder').onclick = () => newFileUI('folder');
  document.getElementById('btn-new-save').onclick   = () => newFileUI('save');
  document.getElementById('btn-run').onclick = () => {
    const f = state.files[state.activeFileId];
    if (f.type !== 'script') { log('Only scripts can run.', 'error'); return; }
    f.content = ed.value; startF(f);
  };
  document.getElementById('btn-stop').onclick  = () => { const f = state.files[state.activeFileId]; if (f) stopF(f); };
  document.getElementById('btn-shop').onclick  = openShop;
  document.getElementById('btn-close-shop').onclick = closeShop;

  renderAll();
  reloop();
  log('Welcome to SCRIPTO. Write a script and press [RUN].', 'info');
  log('Commands: collect  save [file]  compress [file]  extract [file]  convert [file]', 'info');
  log('Tip: create a .dat save file first!', 'info');
})();
</script>
