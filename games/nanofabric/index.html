<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NanoFactory</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="screens.css">
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div id="toolbar-left">
    <span id="hud-power" class="hud-stat"></span>
  </div>
  <div id="toolbar-center">
    <span id="toolbar-title">NANOFACTORY</span>
  </div>
  <div id="toolbar-right">
    <button id="btn-save" class="tb-btn" title="Save"></button>
  </div>
</div>

<!-- RESOURCES BAR -->
<div id="res-bar"></div>

<!-- MODE BADGE -->
<div id="mode-badge"></div>

<!-- GRID CANVAS -->
<div id="grid-wrap">
  <canvas id="grid-canvas"></canvas>
</div>

<!-- BOTTOM NAV -->
<div id="bottom-nav"></div>

<!-- BUILD PANEL (slide-up) -->
<div id="build-panel" class="side-panel hidden">
  <div class="panel-header">
    <span>BUILD</span>
    <button class="close-btn" data-close="build-panel"></button>
  </div>
  <div class="tool-section">
    <div class="tool-label">TOOLS</div>
    <div id="tool-buttons"></div>
  </div>
  <div class="tool-section">
    <div class="tool-label">BUILDINGS</div>
    <div id="building-buttons"></div>
  </div>
</div>

<!-- RESEARCH PANEL -->
<div id="research-panel" class="side-panel hidden">
  <div class="panel-header">
    <span>RESEARCH</span>
    <button class="close-btn" data-close="research-panel"></button>
  </div>
  <div id="rp-bar" class="rp-bar"></div>
  <div id="research-list"></div>
</div>

<!-- STATS PANEL -->
<div id="stats-panel" class="side-panel hidden">
  <div class="panel-header">
    <span>STATS</span>
    <button class="close-btn" data-close="stats-panel"></button>
  </div>
  <div id="stats-content"></div>
</div>

<!-- TILE INFO POPUP -->
<div id="tile-popup" class="tile-popup hidden">
  <div id="tile-popup-title"></div>
  <div id="tile-popup-body"></div>
  <div id="tile-popup-actions"></div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script src="icons.js"></script>
<script src="config.js"></script>
<script src="state.js"></script>
<script src="engine.js"></script>
<script src="save.js"></script>
<script src="achievements.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>
</body>
</html>
