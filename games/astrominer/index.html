<style>

.panel{padding:16px;border-radius:var(--r);background:linear-gradient(160deg,rgba(13,18,36,.92),rgba(18,25,51,.92));border:1px solid #22305c;display:flex;flex-direction:column;gap:12px}#clickerZone{flex:1;display:flex;align-items:center;justify-content:center;min-height:380px;position:relative}#planetWrap{position:relative;width:210px;height:210px}#planetWrap::before{content:'';position:absolute;top:50%;left:50%;width:290px;height:78px;border:2px solid rgba(90,209,255,.32);border-radius:50%;transform:translate(-50%,-50%) rotate(-18deg);pointer-events:none;box-shadow:0 0 18px rgba(90,209,255,.16)}#planet{width:210px;height:210px;border-radius:50%;cursor:pointer;user-select:none;background:radial-gradient(circle at 30% 65%,rgba(0,0,0,.55) 0%,transparent 12%),radial-gradient(circle at 60% 40%,rgba(0,0,0,.42) 0%,transparent 9%),radial-gradient(circle at 70% 70%,rgba(0,0,0,.52) 0%,transparent 7%),radial-gradient(circle at 40% 25%,rgba(255,255,255,.15) 0%,transparent 20%),radial-gradient(circle at 35% 30%,#9d8fff 0%,#4c3fa8 45%,#241a5e 80%,#120c33 100%);box-shadow:0 0 60px 10px rgba(138,123,255,.45),0 0 120px 40px rgba(90,140,255,.15),inset -25px -25px 50px rgba(0,0,0,.55),inset 15px 15px 40px rgba(255,255,255,.08);animation:pulse 3s ease-in-out infinite;transition:transform .08s}#planet.tap{transform:scale(.9)}@keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.13)}}
.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{padding:9px 13px;border-radius:10px;background:#101736;border:1px solid #26346a;color:var(--dim);cursor:pointer;font-weight:700;font-size:.88rem;transition:.12s}.tab.on{background:var(--accent);border-color:var(--accent);color:#04101f}.section{display:none;flex-direction:column;gap:8px}.section.on{display:flex}.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 13px;border-radius:11px;background:#101736;border:1px solid #22305c;cursor:pointer;transition:.13s}.row:hover{border-color:var(--accent)}.row.off{opacity:.38;pointer-events:none}.row.done{opacity:.55;pointer-events:none;border-color:var(--success)}.rLeft{display:flex;align-items:center;gap:10px;min-width:0}.rIco{width:36px;height:36px;border-radius:9px;background:#0c1330;display:flex;align-items:center;justify-content:center;color:var(--accent);flex:0 0 36px}.rName{font-weight:700;font-size:.92rem}.rDesc{font-size:.74rem;color:var(--dim)}.rPrice{color:var(--gold);font-weight:800;white-space:nowrap;font-size:.85rem}.rCount{color:var(--accent);font-weight:800;min-width:26px;text-align:center}

<div id="app"><div class="screen active" id="homeScreen"></div><div class="screen" id="settingsScreen"></div><div class="screen" id="achScreen"></div><div class="screen" id="lbScreen"></div><div class="screen" id="gameScreen"></div></div>

<script>
const GAMEBOX_API='https://gameboxsaves.db.scoodol.de';
const GAME_ID='astrominer';
const BOARD_KEY='lifetime_ore';

// ── GameBox parent-frame bridge ──
const parentDbGet=key=>new Promise(res=>{
  const id='gbg_'+Math.random().toString(36).slice(2);
  const h=e=>{if(e.data&&e.data.__gbRes===id){window.removeEventListener('message',h);res(e.data.value)}};
  window.addEventListener('message',h);
  window.parent.postMessage({__gbGet:key,__gbReqId:id},'*');
  setTimeout(()=>{window.removeEventListener('message',h);res(null)},2000);
});
async function gbAuth(){
  const [account_id,account_key,console_key,username]=await Promise.all([
    parentDbGet('account_id'),parentDbGet('account_key'),
    parentDbGet('console_key'),parentDbGet('account_username')
  ]);
  return {account_id,account_key,console_key,username:username||'Gast'};
}

async function lbSubmit(score){
  try{
    const auth=await gbAuth();
    const body={game_id:GAME_ID,board_key:BOARD_KEY,score:Math.floor(score),username:auth.username};
    if(auth.account_id&&auth.account_key){body.account_id=auth.account_id;body.account_key=auth.account_key;}
    else if(auth.console_key){body.console_key=auth.console_key;}
    else return;
    await fetch(GAMEBOX_API+'/api/leaderboard/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  }catch(e){console.warn('LB submit failed',e);}
}
async function lbFetch(limit=15){
  const r=await fetch(`${GAMEBOX_API}/api/leaderboard/${GAME_ID}/${BOARD_KEY}/top?limit=${limit}`);
  if(!r.ok)throw new Error('fetch failed');
  const data=await r.json();
  return Array.isArray(data?.entries) ? data.entries : [];
}

// ── submit whenever lifetime-ore grows ──
let _lastLbOre=0;
async function maybeSubmitLb(){
  if(G.lo>_lastLbOre){
    _lastLbOre=G.lo;
    lbSubmit(G.lo);
  }
}

const IC={gear:`<svg class="icon" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 13a7.6 7.6 0 000-2l2-1.5-2-3.4-2.3.9a7.7 7.7 0 00-1.7-1L15 3h-4l-.4 2.5a7.7 7.7 0 00-1.7 1l-2.3-.9-2 3.4L6.6 11a7.6 7.6 0 000 2l-2 1.5 2 3.4 2.3-.9c.5.4 1.1.8 1.7 1L11 21h4l.4-2.5c.6-.2 1.2-.6 1.7-1l2.3.9 2-3.4-2-1.5z"/></svg>`,shop:`<svg class="icon" viewBox="0 0 24 24"><path d="M3 9l1-5h16l1 5"/><path d="M3 9a2 2 0 004 0 2 2 0 004 0 2 2 0 004 0 2 2 0 004 0"/><path d="M5 9v10h14V9"/><path d="M9 19v-6h6v6"/></svg>`,flask:`<svg class="icon" viewBox="0 0 24 24"><path d="M9 2h6"/><path d="M10 2v6L4.5 18a2 2 0 001.8 3h11.4a2 2 0 001.8-3L14 8V2"/><path d="M7 15h10"/></svg>`,trophy:`<svg class="icon" viewBox="0 0 24 24"><path d="M8 4h8v5a4 4 0 01-8 0V4z"/><path d="M8 5H5a1 1 0 00-1 1v1a4 4 0 004 4"/><path d="M16 5h3a1 1 0 011 1v1a4 4 0 01-4 4"/><path d="M9 19h6"/><path d="M12 13v6"/></svg>`,lb:`<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>`,x:`<svg class="icon" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>`,save:`<svg class="icon" viewBox="0 0 24 24"><path d="M5 4h11l3 3v13H5z"/><path d="M8 4v5h8V4"/><path d="M8 14h8v6H8z"/></svg>`,load:`<svg class="icon" viewBox="0 0 24 24"><path d="M4 7a2 2 0 012-2h4l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2z"/></svg>`,reset:`<svg class="icon" viewBox="0 0 24 24"><path d="M4 4v6h6"/><path d="M20 20v-6h-6"/><path d="M20 10a8 8 0 00-14.9-3.4M4 14a8 8 0 0014.9 3.4"/></svg>`,pick:`<svg class="icon" viewBox="0 0 24 24"><path d="M4 20l6-6"/><path d="M8 4c3 1 6 4 8 8-2-1-5-1-8 2-2-3-2-6-2-10z"/><path d="M12 4c-1 3-4 6-8 8 1-2 4-5 8-8z"/></svg>`,drone:`<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5"/><path d="M4 6l4 4M20 6l-4 4M4 18l4-4M20 18l-4-4"/><circle cx="4" cy="6" r="1.5"/><circle cx="20" cy="6" r="1.5"/><circle cx="4" cy="18" r="1.5"/><circle cx="20" cy="18" r="1.5"/></svg>`,drill:`<svg class="icon" viewBox="0 0 24 24"><path d="M12 2l3 3H9z"/><path d="M9 5h6v6H9z"/><path d="M11 11h2v9l-1 3-1-3z"/></svg>`,ext:`<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4M5 5l2.5 2.5M16.5 16.5L19 19M19 5l-2.5 2.5M7.5 16.5L5 19"/></svg>`,dyson:`<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><ellipse cx="12" cy="12" rx="9" ry="3.5"/><ellipse cx="12" cy="12" rx="3.5" ry="9"/></svg>`,star:`<svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l2.9 6.3L22 9l-5 5 1.2 7L12 17.8 5.8 21 7 14 2 9l7.1-.7z"/></svg>`,bolt:`<svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg>`,comet:`<svg class="icon" viewBox="0 0 24 24"><circle cx="16" cy="8" r="3"/><path d="M13 11L4 20"/></svg>`};
const BLDGS=[{id:'pickaxe',n:'Plasma-Spitzhacke',p:15,c:0.1,i:IC.pick},{id:'drone',n:'Bergbau-Drohne',p:100,c:1,i:IC.drone},{id:'drill',n:'Mond-Bohrer',p:1100,c:8,i:IC.drill},{id:'ext',n:'Quanten-Extraktor',p:12000,c:47,i:IC.ext},{id:'dyson',n:'Dyson-Schwarm',p:130000,c:260,i:IC.dyson},{id:'smelter',n:'Plasma-Schmelzer',p:750000,c:1400,i:IC.ext},{id:'harvest',n:'Helium-Harvester',p:5000000,c:8200,i:IC.drone},{id:'factory',n:'Orbital-Fabrik',p:30000000,c:46000,i:IC.shop},{id:'singul',n:'Singularitätskern',p:250000000,c:280000,i:IC.flask},{id:'halo',n:'Halo-Ring',p:1500000000,c:1600000,i:IC.dyson}];
const UPGRADES=[{id:'laser',n:'Verstärkter Laser',d:'Klick-Kraft ×2',p:100},{id:'ion',n:'Ionen-Triebwerke',d:'Drohnen-CPS ×2',p:500},{id:'aimine',n:'KI-Bohrmuster',d:'Globales CPS +10%',p:3000},{id:'antimtr',n:'Antimaterie',d:'Klick-Kraft += 1% der Globalen CPS',p:50000},{id:'cargo',n:'Automatische Frachter',d:'Alle Gebäude +8% CPS',p:250000},{id:'overclk',n:'Overclocking',d:'Klick-Kraft +50%',p:1000000},{id:'qres',n:'Quanten-Resonanz',d:'Globales CPS +25%',p:5000000},{id:'wormh',n:'Wurmloch-Spulen',d:'Dyson & Halo-Ring ×1.5 CPS',p:25000000},{id:'nanite',n:'Naniten-Schwarm',d:'Alle Gebäude +20% CPS',p:100000000},{id:'timewp',n:'Zeit-Warp',d:'Globales CPS +50%',p:750000000}];
const ACHS=[{id:'a1',n:'Erster Kontakt',d:'1 Lifetime-Ore',f:s=>s.lo>=1},{id:'a2',n:'Sammler',d:'1.000 Lifetime-Ore',f:s=>s.lo>=1000},{id:'a3',n:'Händler',d:'100.000 Lifetime-Ore',f:s=>s.lo>=100000},{id:'a4',n:'Steinreich',d:'1.000.000 Ore gleichzeitig',f:s=>s.ore>=1000000},{id:'a5',n:'Großindustrie',d:'10M Lifetime-Ore',f:s=>s.lo>=10000000},{id:'a6',n:'Imperium',d:'1 Mrd Lifetime-Ore',f:s=>s.lo>=1e9},{id:'a7',n:'Galaktisch',d:'1 Bio Lifetime-Ore',f:s=>s.lo>=1e12},{id:'a8',n:'Erste Hacke',d:'1 Plasma-Spitzhacke',f:s=>s.b.pickaxe>=1},{id:'a9',n:'Flotten-Kommandant',d:'10 Bergbau-Drohnen',f:s=>s.b.drone>=10},{id:'a10',n:'Bohrmeister',d:'10 Mond-Bohrer',f:s=>s.b.drill>=10},{id:'a11',n:'Quantensammler',d:'10 Quanten-Extraktoren',f:s=>s.b.ext>=10},{id:'a12',n:'Sonnenherrscher',d:'10 Dyson-Schwärme',f:s=>s.b.dyson>=10},{id:'a13',n:'Halo-Bauer',d:'5 Halo-Ringe',f:s=>s.b.halo>=5},{id:'a14',n:'Vollausbau',d:'Jedes Gebäude min. 25×',f:s=>BLDGS.every(b=>s.b[b.id]>=25)},{id:'a15',n:'Dauer-Klicker',d:'250 manuelle Klicks',f:s=>s.clicks>=250},{id:'a16',n:'Klickmaster',d:'5.000 manuelle Klicks',f:s=>s.clicks>=5000},{id:'a17',n:'Erste Forschung',d:'1 Upgrade erworben',f:s=>Object.keys(s.u).length>=1},{id:'a18',n:'Vollforscher',d:'Alle Upgrades erworben',f:s=>Object.keys(s.u).length>=UPGRADES.length},{id:'a19',n:'Erster Reset',d:'1× Quantum Reset',f:s=>s.pc>=1},{id:'a20',n:'Dunkle Materie',d:'10 Dark Matter gesammelt',f:s=>s.dm>=10},{id:'a21',n:'Kometenjäger',d:'5 Komets eingesammelt',f:s=>s.cc>=5},{id:'a22',n:'Veteran',d:'5× Quantum Reset',f:s=>s.pc>=5}];
const SK='am_v5';
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a; const fmt=n=>{if(n<1e3)return Math.floor(n)+'';const u=['K','M','B','T','Qa','Qi','Sx','Sp'];let i=-1;while(n>=1000&&i<u.length-1){n/=1000;i++}return n.toFixed(2)+u[i]};
function def(){const b={};BLDGS.forEach(x=>b[x.id]=0);return{ore:0,lo:0,clicks:0,b,u:{},ach:{},dm:0,pc:0,cc:0,hd:0,nc:Date.now()+rnd(60000,120000),tab:'build',dmNerfApplied:false}};
let G=def(),cometEl=null,confirmCb=null;
const save=()=>localStorage.setItem(SK,JSON.stringify(G));
function migrateLegacy(){const oldKeys=['am_v4','am_v3','am_v2','astrominer_save_v3','astrominer_save_v2']; for(const k of oldKeys){const r=localStorage.getItem(k); if(!r) continue; try{const p=JSON.parse(r); G=def(); Object.assign(G,p); BLDGS.forEach(x=>{if(G.b[x.id]==null)G.b[x.id]=0}); if(!G.dmNerfApplied){ if(G.dm>10){G.dm=Math.max(1,Math.floor(G.dm/100));} G.dmNerfApplied=true;} save(); return true;}catch(e){}} return false;}
function load(){const r=localStorage.getItem(SK); if(r){try{const p=JSON.parse(r); G=def(); Object.assign(G,p); BLDGS.forEach(x=>{if(G.b[x.id]==null)G.b[x.id]=0}); if(!G.dmNerfApplied){ if(G.dm>10){G.dm=Math.max(1,Math.floor(G.dm/100));} G.dmNerfApplied=true; save();}}catch(e){migrateLegacy();}} else migrateLegacy();}
function toast(ico,msg,err=false){const w=document.getElementById('toastWrap');const d=document.createElement('div');d.className='toast'+(err?' err':'');d.innerHTML=`${ico}<span>${msg}</span>`;w.appendChild(d);setTimeout(()=>d.remove(),4000)}
function confirm2(text,cb){document.getElementById('modalText').textContent=text;document.getElementById('modal').classList.add('show');confirmCb=cb}
document.getElementById('modalClose').innerHTML=IC.x; document.getElementById('modalCancel').innerHTML=IC.x+' Abbrechen'; document.getElementById('modalOk').innerHTML=IC.reset+' OK'; ['modalClose','modalCancel'].forEach(id=>document.getElementById(id).onclick=()=>document.getElementById('modal').classList.remove('show')); document.getElementById('modalOk').onclick=()=>{document.getElementById('modal').classList.remove('show');confirmCb&&confirmCb()};
const bldgCost=b=>Math.ceil(b.p*Math.pow(1.15,G.b[b.id]));
function gmult(){let m=1;if(G.u.aimine)m*=1.10;if(G.u.qres)m*=1.25;if(G.u.timewp)m*=1.50;m*=1+Object.keys(G.ach).length*0.01;m*=1+G.dm*0.02;if(Date.now()<G.hd)m*=7;return m}
function baseCps(){let t=0;BLDGS.forEach(b=>{let c=b.c*G.b[b.id]; if(G.u.ion&&b.id==='drone')c*=2; if(G.u.cargo)c*=1.08; if(G.u.nanite)c*=1.20; if(G.u.wormh&&(b.id==='dyson'||b.id==='halo'))c*=1.5; t+=c}); return t}
const cps=()=>baseCps()*gmult();
function clickPow(){let p=1;if(G.u.laser)p*=2;if(G.u.overclk)p*=1.5;p*=1+G.dm*0.02;if(G.u.antimtr)p+=cps()*0.01;return p}
const addOre=a=>{G.ore+=a;G.lo+=a};
function isFullyMaxed(){return BLDGS.every(b=>G.b[b.id]>=25)&&UPGRADES.every(u=>G.u[u.id]);}
function prestigeGain(){
  if(G.lo<1e6) return 0;
  if(isFullyMaxed()) return 20;
  const gain=Math.floor(Math.log10(G.lo/1e6)*2)+1;
  return Math.max(1,Math.min(19,gain));
}
function prestigeReady(){return G.lo>=1e6&&prestigeGain()>0;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

// ── Leaderboard Screen (gefixt: korrekte Feldnamen laut Backend-Doku) ──
async function renderLb(){
  const el=document.getElementById('lbScreen');
  el.innerHTML=`<div class="center"><div class="card lbWrap"><div class="pageHead"><div class="pageTitle">${IC.lb} Leaderboard – Lifetime Ore</div><button class="iconBtn" id="lbBack">${IC.x}</button></div><div id="lbList"><div class="lbLoading">Wird geladen…</div></div></div></div>`;
  document.getElementById('lbBack').onclick=()=>{renderHome();showScreen('homeScreen')};

  try{
    const auth=await gbAuth();
    const entries=await lbFetch(15);
    const myName=(auth?.username || '').trim();

    if(!entries.length){
      document.getElementById('lbList').innerHTML='<div class="lbEmpty">Noch keine Einträge. Spiele AstroMiner, um der Erste zu sein!</div>';
      return;
    }

    const medals=['🥇','🥈','🥉'];

    document.getElementById('lbList').innerHTML=entries.map((raw,i)=>{
      const username=String(raw?.username ?? 'Unbekannt');
      const scoreNum=Number(raw?.score ?? 0);
      const safeScore=Number.isFinite(scoreNum) ? scoreNum : 0;
      const sourceType=raw?.source_type || raw?.sourcetype || raw?.sourceType || 'console';

      const isMe=myName && username===myName;
      const rankClass=i===0?'top1':i===1?'top2':i===2?'top3':'';
      const medal=medals[i]||`#${i+1}`;
      const typeLabel=sourceType==='account'
        ? '<span class="lbType">☁️</span>'
        : '<span class="lbType">🖥️</span>';

      return `<div class="lbEntry ${isMe?'lbMe':''}">
        <div class="lbRank ${rankClass}">${medal}</div>
        <div class="lbName">${username}${typeLabel}</div>
        <div class="lbScore">${fmt(safeScore)} Ore</div>
      </div>`;
    }).join('');
  }catch(err){
    console.error('Leaderboard render failed:', err);
    document.getElementById('lbList').innerHTML='<div class="lbEmpty" style="color:var(--danger)">Fehler beim Laden des Leaderboards.</div>';
  }
}

function renderHome(){const el=document.getElementById('homeScreen'); el.innerHTML=`<div class="center"><div class="card homeWrap"><div class="heroLeft"><div class="bigTitle">AstroMiner:<br>Cosmic Idle</div><div class="heroSub">Baue ein galaktisches Bergbau-Imperium. Prestige ab 1 Mio. Ore – für maximale 20 DM musst du alles maxen.</div><div class="homeActions"><button class="btn" id="hStart">${IC.star} Spielen</button><button class="btn sec" id="hLb">${IC.lb} Leaderboard</button><button class="btn sec" id="hAch">${IC.trophy} Achievements</button><button class="btn sec" id="hSet">${IC.gear} Settings</button></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px"><span class="chip">10 Gebäude</span><span class="chip">10 Upgrades</span><span class="chip">v1.2.2 (leaderboard-fix)</span></div></div><div class="heroRight card"><div class="menuCard" id="hmLb"><div><div class="mTitle">Leaderboard</div><div class="mDesc">Top Lifetime Ore weltweit</div></div><div class="menuIco">${IC.lb}</div></div><div class="menuCard" id="hmAch"><div><div class="mTitle">Achievements</div><div class="mDesc">${Object.keys(G.ach).length}/${ACHS.length} freigeschaltet</div></div><div class="menuIco">${IC.trophy}</div></div><div class="menuCard" id="hmSet"><div><div class="mTitle">Settings</div><div class="mDesc">Speichern · Laden · Reset</div></div><div class="menuIco">${IC.gear}</div></div><div class="menuCard" id="hmPlay"><div><div class="mTitle">Weiterspielen</div><div class="mDesc">${fmt(G.ore)} Ore · ${fmt(cps())} CPS</div></div><div class="menuIco">${IC.star}</div></div></div></div></div>`;
document.getElementById('hStart').onclick=()=>showScreen('gameScreen');
document.getElementById('hLb').onclick=()=>{renderLb();showScreen('lbScreen')};
document.getElementById('hAch').onclick=()=>{renderAch();showScreen('achScreen')};
document.getElementById('hSet').onclick=()=>{renderSettings();showScreen('settingsScreen')};
document.getElementById('hmLb').onclick=()=>{renderLb();showScreen('lbScreen')};
document.getElementById('hmAch').onclick=()=>{renderAch();showScreen('achScreen')};
document.getElementById('hmSet').onclick=()=>{renderSettings();showScreen('settingsScreen')};
document.getElementById('hmPlay').onclick=()=>showScreen('gameScreen');}
function renderSettings(){const el=document.getElementById('settingsScreen'); el.innerHTML=`<div class="center"><div class="card subWrap"><div class="pageHead"><div class="pageTitle">${IC.gear} Settings</div><button class="iconBtn" id="sBack">${IC.x}</button></div><div class="settList"><button class="btn sec" id="sSave">${IC.save} Spielstand speichern</button><button class="btn sec" id="sLoad">${IC.load} Spielstand laden</button><button class="btn danger" id="sReset">${IC.reset} Hard Reset</button></div></div></div>`; document.getElementById('sBack').onclick=()=>{renderHome();showScreen('homeScreen')}; document.getElementById('sSave').onclick=()=>{save();toast(IC.save,'Spielstand gespeichert!')}; document.getElementById('sLoad').onclick=()=>{load();toast(IC.load,'Spielstand geladen!');renderHome();showScreen('homeScreen')}; document.getElementById('sReset').onclick=()=>confirm2('Wirklich alles löschen? (Unwiderruflich)',()=>{localStorage.removeItem(SK);G=def();toast(IC.reset,'Hard Reset!');renderHome();showScreen('homeScreen')})}
function renderAch(){const el=document.getElementById('achScreen'); const u=Object.keys(G.ach).length; el.innerHTML=`<div class="center"><div class="card subWrap" style="max-width:860px"><div class="pageHead"><div class="pageTitle">${IC.trophy} Achievements <span style="color:var(--dim);font-size:.85rem;font-weight:400">${u}/${ACHS.length}</span></div><button class="iconBtn" id="aBack">${IC.x}</button></div><div class="achGrid">${ACHS.map(a=>`<div class="achCard ${G.ach[a.id]?'on':''}"><div class="achBadge">${IC.trophy}</div><div><div class="achName">${a.n}</div><div class="achDesc">${a.d}</div></div></div>`).join('')}</div></div></div>`; document.getElementById('aBack').onclick=()=>{renderHome();showScreen('homeScreen')}}
function renderGame(){const el=document.getElementById('gameScreen'); const gain=prestigeGain(); const ready=prestigeReady(); const fullyMaxed=isFullyMaxed(); const tabBtns=['build','research','prestige'].map(t=>`<button class="tab ${G.tab===t?'on':''}" data-tab="${t}">${t==='build'?'Shop':t==='research'?'Forschung':'Prestige'}</button>`).join(''); const buildRows=BLDGS.map(b=>{const c=bldgCost(b), can=G.ore>=c; return `<div class="row ${can?'':'off'}" data-buy="${b.id}"><div class="rLeft"><div class="rIco">${b.i}</div><div><div class="rName">${b.n}</div><div class="rDesc">${b.c} Ore/s · ${fmt(c)} Ore</div></div></div><div class="rCount">${G.b[b.id]}</div></div>`}).join(''); const resRows=UPGRADES.map(u=>{ if(G.u[u.id]) return `<div class="row done"><div class="rLeft"><div class="rIco">${IC.flask}</div><div><div class="rName">${u.n}</div><div class="rDesc">${u.d}</div></div></div><div class="rCount">✓</div></div>`; const can=G.ore>=u.p; return `<div class="row ${can?'':'off'}" data-upg="${u.id}"><div class="rLeft"><div class="rIco">${IC.flask}</div><div><div class="rName">${u.n}</div><div class="rDesc">${u.d}</div></div></div><div class="rPrice">${fmt(u.p)}</div></div>` }).join('');
const prSection=`<div class="row" style="cursor:default"><div class="rLeft"><div class="rIco">${IC.reset}</div><div><div class="rName">Quantum Reset</div><div class="rDesc">Dark Matter: ${G.dm} · Prestige: ${G.pc}× · Gain: +${gain} DM</div></div></div></div>
<div class="muted" style="font-size:.82rem">Reset möglich ab <b style="color:var(--gold)">1 Mio. Lifetime-Ore</b> – du bekommst dann wenig DM. Für exakt <b style="color:var(--gold)">20 DM</b> musst du alle Gebäude auf 25× und alle Upgrades maxen.</div>
<div class="muted" style="font-size:.82rem;margin-top:6px">${fullyMaxed?'🌟 Alles maxed → +20 DM!':G.lo>=1e6?`Früher Reset möglich → +${gain} DM`:'Noch nicht genug Lifetime-Ore (min. 1 Mio.)'}</div>
<button class="btn ${ready?'':'sec'}" ${ready?'':'disabled'} id="prBtn">${IC.reset} Quantum Reset (+${gain} DM)</button>`;
el.innerHTML=`<div class="gameInner"><div class="gameTop"><div><div class="oreDisplay">${fmt(G.ore)}</div><div class="cpsDisplay">${fmt(cps())} CPS · DM: ${G.dm} · Lifetime: ${fmt(G.lo)}</div></div><div class="topRight"><button class="iconBtn" id="gLb" title="Leaderboard">${IC.lb}</button><button class="iconBtn" id="gAch" title="Achievements">${IC.trophy}</button><button class="iconBtn" id="gHome" title="Home">${IC.star}</button></div></div><div id="hyperBar"></div><div class="gameGrid"><div class="panel"><div id="clickerZone"><div id="planetWrap"><div id="planet"></div></div></div></div><div class="panel"><div class="tabs">${tabBtns}</div><div class="section ${G.tab==='build'?'on':''}" id="secBuild">${buildRows}</div><div class="section ${G.tab==='research'?'on':''}" id="secRes">${resRows}</div><div class="section ${G.tab==='prestige'?'on':''}" id="secPr">${prSection}</div></div></div></div>`;
if(Date.now()<G.hd) document.getElementById('hyperBar').textContent=`⚡ Hyper-Drive aktiv · ×7 CPS · ${Math.ceil((G.hd-Date.now())/1000)}s`;
document.getElementById('gHome').onclick=()=>{renderHome();showScreen('homeScreen')};
document.getElementById('gLb').onclick=()=>{renderLb();showScreen('lbScreen')};
document.getElementById('gAch').onclick=()=>{renderAch();showScreen('achScreen')};
document.getElementById('planet').onclick=e=>{const p=clickPow(); addOre(p); G.clicks++; spawnParticle(e.clientX,e.clientY,p); checkAch(); renderGame()};
document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{G.tab=b.dataset.tab; renderGame()});
document.querySelectorAll('[data-buy]').forEach(r=>r.onclick=()=>{const b=BLDGS.find(x=>x.id===r.dataset.buy); const c=bldgCost(b); if(G.ore>=c){G.ore-=c; G.b[b.id]++; checkAch(); renderGame()}});
document.querySelectorAll('[data-upg]').forEach(r=>r.onclick=()=>{const u=UPGRADES.find(x=>x.id===r.dataset.upg); if(!G.u[u.id]&&G.ore>=u.p){G.ore-=u.p; G.u[u.id]=true; toast(IC.flask,`${u.n} erforscht`); checkAch(); renderGame()}});
document.getElementById('prBtn')?.addEventListener('click',()=>{const g=prestigeGain(); if(g<=0) return; confirm2(`Quantum Reset: +${g} Dark Matter. Ore, Gebäude und Upgrades werden zurückgesetzt. Achievements & DM bleiben.`,()=>{const ach=G.ach,dm=G.dm+g,pc=G.pc+1,cc=G.cc,migrated=G.dmNerfApplied; G=def(); G.ach=ach; G.dm=dm; G.pc=pc; G.cc=cc; G.dmNerfApplied=migrated; toast(IC.reset,`+${g} Dark Matter!`); renderGame()});});}
function spawnParticle(x,y,a){const p=document.createElement('div'); p.className='particle'; p.textContent='+'+fmt(a); p.style.left=(x+rnd(-10,10))+'px'; p.style.top=(y-10)+'px'; document.body.appendChild(p); setTimeout(()=>p.remove(),1000)}
function checkAch(){ACHS.forEach(a=>{if(!G.ach[a.id]&&a.f(G)){G.ach[a.id]=true; toast(IC.trophy,`Erfolg: ${a.n}`)}})}
function maybeComet(){if(Date.now()<G.nc||cometEl)return; cometEl=document.createElement('div'); Object.assign(cometEl.style,{position:'fixed',width:'44px',height:'44px',borderRadius:'50%',background:'radial-gradient(circle,#ffd25a,#ff9f4a 70%)',boxShadow:'0 0 25px #ffd25a,0 0 50px rgba(255,210,90,.6)',cursor:'pointer',zIndex:'500',top:rnd(80,window.innerHeight*.6)+'px',left:'-60px'}); document.body.appendChild(cometEl); let x=-60; const st=Date.now(), dur=8000; const mv=()=>{x=-60+(window.innerWidth+120)*((Date.now()-st)/dur); if(!cometEl) return; cometEl.style.left=x+'px'; if(x<window.innerWidth+60&&cometEl) requestAnimationFrame(mv); else {cometEl?.remove(); cometEl=null}}; requestAnimationFrame(mv); cometEl.onclick=()=>{cometEl?.remove(); cometEl=null; G.cc++; if(Math.random()<.5){G.hd=Date.now()+15000; toast(IC.bolt,'Hyper-Drive ×7 für 15s!')} else {const b=cps()*60; addOre(b); toast(IC.comet,`+${fmt(b)} Ore!`)} checkAch(); if(document.getElementById('gameScreen').classList.contains('active')) renderGame()}; G.nc=Date.now()+rnd(60000,120000)}
setInterval(()=>{addOre(cps()*.1); maybeComet(); checkAch(); maybeSubmitLb(); if(document.getElementById('gameScreen').classList.contains('active')) renderGame()},100); setInterval(save,10000); load(); renderHome(); showScreen('homeScreen');
</script>
</body>
