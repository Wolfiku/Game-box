<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lonely Tower</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
      padding: 20px 0;
    }
    #wrapper {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    canvas {
      display: block;
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      image-rendering: pixelated;
    }
    #sidebar {
      width: 180px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #stats {
      background: #111120;
      border: 1px solid #1e1e2e;
      padding: 10px;
      font-size: 12px;
      line-height: 1.8;
      color: #aaa;
    }
    #stats span { color: #e0e0e0; }
    #upgrades-title {
      font-size: 10px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .upg-btn {
      width: 100%;
      background: #111120;
      border: 1px solid #1e1e2e;
      color: #aaa;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 7px 8px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, color 0.15s;
      line-height: 1.5;
    }
    .upg-btn:hover:not(:disabled) {
      border-color: #4a9eff;
      color: #e0e0e0;
    }
    .upg-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .upg-btn .upg-name { display: block; color: #e0e0e0; font-size: 11px; }
    .upg-btn .upg-info { display: block; color: #555; font-size: 10px; }
    .upg-btn.affordable .upg-info { color: #4a9eff; }
    #wave-bar-wrap {
      background: #111120;
      border: 1px solid #1e1e2e;
      padding: 8px;
    }
    #wave-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    #wave-bar-bg { background: #1a1a2e; height: 6px; width: 100%; }
    #wave-bar-fill { background: #4a9eff; height: 6px; width: 0%; transition: width 0.1s; }
    #wave-next { font-size: 10px; color: #444; margin-top: 4px; }

    /* Intro Splash */
    #splash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      cursor: pointer;
    }
    #splash-title {
      font-family: 'Courier New', monospace;
      font-size: clamp(36px, 7vw, 72px);
      font-weight: bold;
      color: #e0e0e0;
      letter-spacing: 6px;
      text-transform: uppercase;
      animation: pulse 2s ease-in-out infinite;
    }
    #splash-sub {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #444;
      letter-spacing: 3px;
      margin-top: 12px;
    }
    #splash-hint {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #2a2a3e;
      position: absolute;
      bottom: 30px;
      letter-spacing: 2px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* Wave announcement */
    #wave-announce {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Courier New', monospace;
      font-size: 28px;
      color: #e0e0e0;
      letter-spacing: 4px;
      pointer-events: none;
      opacity: 0;
      z-index: 500;
      text-transform: uppercase;
    }
    #wave-announce.show {
      animation: waveAnnounce 1.8s ease forwards;
    }
    @keyframes waveAnnounce {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      70%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    }

    /* Game over */
    #gameover {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10,10,15,0.92);
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 900;
    }
    #gameover.show { display: flex; }
    #gameover h2 { font-size: 32px; letter-spacing: 4px; color: #e0e0e0; margin-bottom: 8px; }
    #gameover p { color: #555; font-size: 13px; margin-bottom: 24px; letter-spacing: 2px; }
    #restart-btn {
      background: none;
      border: 1px solid #4a9eff;
      color: #4a9eff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 10px 28px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.15s, color 0.15s;
    }
    #restart-btn:hover { background: #4a9eff; color: #0a0a0f; }
  </style>
</head>
<body>

<!-- Intro Splash -->
<div id="splash">
  <div id="splash-title">Lonely Tower</div>
  <div id="splash-sub">@wolfikuproduction</div>
  <div id="splash-hint">click to start</div>
</div>

<!-- Wave Announcement -->
<div id="wave-announce"></div>

<!-- Game Over -->
<div id="gameover">
  <h2>GAME OVER</h2>
  <p id="gameover-info">wave 1 · 0 kills</p>
  <button id="restart-btn" onclick="restartGame()">RESTART</button>
</div>

<div id="wrapper">
  <canvas id="gameCanvas" width="380" height="600"></canvas>
  <div id="sidebar">
    <div id="stats">
      <span style="color:#4a9eff;letter-spacing:2px;font-size:11px;">LONELY TOWER</span><br>
      Wave: <span id="waveNum">1</span><br>
      Lives: <span id="livesDisp">100</span><br>
      Gold: <span id="goldDisp">0</span>
    </div>

    <div id="wave-bar-wrap">
      <div id="wave-label">Next Wave</div>
      <div id="wave-bar-bg"><div id="wave-bar-fill"></div></div>
      <div id="wave-next">–</div>
    </div>

    <div id="upgrades-title">Upgrades</div>

    <button class="upg-btn" id="btn-speed">
      <span class="upg-name">⚡ Fire Rate</span>
      <span class="upg-info" id="info-speed">Lv 1 · Cost 10</span>
    </button>
    <button class="upg-btn" id="btn-dmg">
      <span class="upg-name">💥 Damage</span>
      <span class="upg-info" id="info-dmg">Lv 1 · Cost 10</span>
    </button>
    <button class="upg-btn" id="btn-gold">
      <span class="upg-name">💰 Gold Multi</span>
      <span class="upg-info" id="info-gold">Lv 0 · Cost 10</span>
    </button>
    <button class="upg-btn" id="btn-crit">
      <span class="upg-name">🎯 Crit Chance</span>
      <span class="upg-info" id="info-crit">Lv 1 · Cost 10</span>
    </button>
    <button class="upg-btn" id="btn-regen">
      <span class="upg-name">❤ Regen</span>
      <span class="upg-info" id="info-regen">Lv 0 · Cost 250</span>
    </button>
    <button class="upg-btn" id="btn-aura-range" disabled>
      <span class="upg-name">🌀 Aura Range</span>
      <span class="upg-info" id="info-aura-range">Unlocks Wave 3 · Cost 1000</span>
    </button>
    <button class="upg-btn" id="btn-aura-dmg" disabled>
      <span class="upg-name">🌀 Aura Damage</span>
      <span class="upg-info" id="info-aura-dmg">Unlocks Wave 3 · Cost 750</span>
    </button>
  </div>
</div>

<script>
// ─── FIRST RUN CHECK ───────────────────────────────────────────────────────────
const splash = document.getElementById('splash');
splash.addEventListener('click', () => {
  splash.style.transition = 'opacity 0.6s';
  splash.style.opacity = '0';
  setTimeout(() => { splash.style.display = 'none'; startGame(); }, 600);
});

// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let state = {};
let running = false;
let animId = null;

// Upgrades persistent across runs
let goldMultLv = 0, goldMultCost = 10, goldMult = 1;
let regenLv = 0, regenCost = 250, regenRate = 0.1;
let auraRange = 0, auraRangeCost = 1000;
let auraDmg = 0, auraDmgCost = 750;

function initState() {
  return {
    wave: 1,
    lives: 100,
    gold: 0,
    frame: 0,
    kills: 0,

    tower: {
      x: canvas.width / 2,
      y: canvas.height - 55,
      shootInterval: 90,
      shootCooldown: 0,
      dmg: 10,
      critChance: 0.01,
    },

    miniR: null,
    miniL: null,

    speedLv: 1, speedCost: 10,
    dmgLv: 1, dmgCost: 10,
    critLv: 1, critCostAdd: 0,

    enemies: [],
    effects: [],  // { x1,y1,x2,y2, timer, crit }
    particles: [], // { x,y, vx,vy, life, color }

    // Wave system
    waveActive: false,
    waveEnemiesLeft: 0,
    waveSpawnTimer: 0,
    wavePauseTimer: 0,
    wavePauseDuration: 300, // 5s between waves (60fps)
  };
}

// ─── WAVE DEFINITIONS ─────────────────────────────────────────────────────────
function getWaveConfig(wave) {
  const base = 8 + wave * 4;
  let types = { base: 1 };
  if (wave >= 2) { types.yellow = 0.15; types.base = 0.85; }
  if (wave >= 3) { types.blue = 0.15; types.yellow = 0.15; types.base = 0.70; }
  if (wave >= 4) { types.black = 0.20; types.purple = 0.05; types.blue = 0.10; types.yellow = 0.15; types.base = 0.50; }
  if (wave >= 6) { types.purple = 0.12; types.black = 0.30; types.base = 0.00; types.blue = 0.15; types.yellow = 0.15; types.big = 0.28; }
  if (wave >= 10) { types.boss = 0.04; }
  return {
    count: Math.floor(base * (1 + (wave - 1) * 0.3)),
    spawnInterval: Math.max(18, 60 - wave * 3),
    healthMult: 1 + (wave - 1) * 0.45,
    speedMult: 1 + (wave - 1) * 0.08,
    types
  };
}

function pickEnemyType(typesObj) {
  const r = Math.random();
  let acc = 0;
  for (const [k, v] of Object.entries(typesObj)) {
    acc += v;
    if (r < acc) return k;
  }
  return 'base';
}

function spawnEnemy(wave) {
  const cfg = getWaveConfig(wave);
  const type = pickEnemyType(cfg.types);
  const x = 20 + Math.random() * (canvas.width - 40);
  const y = -20;
  const baseH = (8 + Math.random() * 8) * cfg.healthMult;
  const baseS = (0.6 + Math.random() * 0.6) * cfg.speedMult;

  let hp = baseH, spd = baseS, size = 13;
  switch (type) {
    case 'yellow': spd *= 2.2; size = 10; break;
    case 'blue':   spd *= 0.5; hp *= 3; size = 16; break;
    case 'purple': spd *= 2; hp *= 6; size = 12; break;
    case 'black':  hp *= 2.5; size = 14; break;
    case 'big':    spd *= 0.4; hp *= 8; size = 22; break;
    case 'boss':   spd *= 0.35; hp *= 25; size = 30; break;
  }

  return { x, y, spd: spd * 0.5, hp: Math.floor(hp), maxHp: Math.floor(hp), type, size };
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 5) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 0.5 + Math.random() * 2;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 25 + Math.random() * 20,
      maxLife: 45,
      color,
      size: 1.5 + Math.random() * 2
    });
  }
}

// ─── SHOOTING ─────────────────────────────────────────────────────────────────
function towerShoot(t, dmgMult = 1) {
  if (!state.enemies.length) return;
  const target = state.enemies.reduce((a, b) => b.y > a.y ? b : a);
  let dmg = state.tower.dmg * dmgMult;
  let crit = false;
  if (Math.random() < state.tower.critChance) { dmg *= 10; crit = true; }
  const actual = Math.min(dmg, target.hp);
  target.hp -= actual;
  state.gold += Math.min(actual * goldMult * 0.5, 30 + state.wave * 10);
  state.effects.push({ x1: t.x, y1: t.y, x2: target.x, y2: target.y, timer: 10, crit });
  if (crit) spawnParticles(target.x, target.y, '#ffaa00', 8);
  if (target.hp <= 0) {
    spawnParticles(target.x, target.y, enemyColor(target.type), 12);
    state.kills++;
    state.enemies.splice(state.enemies.indexOf(target), 1);
  }
  t.shootCooldown = t.shootInterval;
}

function enemyColor(type) {
  switch (type) {
    case 'yellow': return '#f0c040';
    case 'blue':   return '#40b0f0';
    case 'purple': return '#c060e0';
    case 'black':  return '#888';
    case 'big':    return '#e06030';
    case 'boss':   return '#ff2244';
    default:       return '#e04040';
  }
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  state.frame++;
  const s = state;
  const tw = s.tower;

  // Lives regen
  if (regenLv > 0) s.lives = Math.min(100, s.lives + regenRate / 60);

  // Wave system
  if (!s.waveActive) {
    s.wavePauseTimer--;
    if (s.wavePauseTimer <= 0) {
      startWave(s.wave);
    }
  } else {
    // Spawn enemies
    if (s.waveEnemiesLeft > 0) {
      s.waveSpawnTimer--;
      if (s.waveSpawnTimer <= 0) {
        s.enemies.push(spawnEnemy(s.wave));
        s.waveEnemiesLeft--;
        s.waveSpawnTimer = getWaveConfig(s.wave).spawnInterval;
      }
    }
    // Check wave clear
    if (s.waveEnemiesLeft <= 0 && s.enemies.length === 0) {
      s.waveActive = false;
      s.wave++;
      s.wavePauseTimer = s.wavePauseDuration;
      updateUI();
    }
  }

  // Unlock aura buttons at wave 3
  document.getElementById('btn-aura-range').disabled = s.wave < 3;
  document.getElementById('btn-aura-dmg').disabled = s.wave < 3;

  // Unlock mini towers
  if (!s.miniR && s.wave >= 4 && s.speedLv >= 20) {
    s.miniR = { x: tw.x + 60, y: tw.y, shootInterval: tw.shootInterval * 1.8, shootCooldown: 0 };
  }
  if (!s.miniL && s.speedLv >= 40) {
    s.miniL = { x: tw.x - 60, y: tw.y, shootInterval: tw.shootInterval * 1.8, shootCooldown: 0 };
  }
  if (s.miniR) { s.miniR.x = tw.x + 60; s.miniR.y = tw.y; s.miniR.shootInterval = tw.shootInterval * 1.8; }
  if (s.miniL) { s.miniL.x = tw.x - 60; s.miniL.y = tw.y; s.miniL.shootInterval = tw.shootInterval * 1.8; }

  // Main tower shoot
  if (tw.shootCooldown > 0) tw.shootCooldown -= 0.5;
  else towerShoot(tw, 1);

  // Mini towers shoot
  if (s.miniR) {
    if (s.miniR.shootCooldown > 0) s.miniR.shootCooldown -= 0.5;
    else towerShoot(s.miniR, 0.5);
  }
  if (s.miniL) {
    if (s.miniL.shootCooldown > 0) s.miniL.shootCooldown -= 0.5;
    else towerShoot(s.miniL, 0.5);
  }

  // Kill Aura
  if (s.wave >= 3 && auraRange > 0 && auraDmg > 0) {
    const auraTop = tw.y - 20 - auraRange;
    for (let i = s.enemies.length - 1; i >= 0; i--) {
      const e = s.enemies[i];
      if (e.y >= auraTop && e.y <= tw.y - 20) {
        const d = Math.min(auraDmg / 60, e.hp);
        e.hp -= d;
        s.gold += Math.min(d * goldMult * 0.5, 5);
        if (e.hp <= 0) {
          spawnParticles(e.x, e.y, enemyColor(e.type), 8);
          s.kills++;
          s.enemies.splice(i, 1);
        }
      }
    }
  }

  // Effects tick
  for (let i = s.effects.length - 1; i >= 0; i--) {
    s.effects[i].timer--;
    if (s.effects[i].timer <= 0) s.effects.splice(i, 1);
  }

  // Particles tick
  for (let i = s.particles.length - 1; i >= 0; i--) {
    const p = s.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.04;
    p.life--;
    if (p.life <= 0) s.particles.splice(i, 1);
  }

  // Move enemies
  for (let i = s.enemies.length - 1; i >= 0; i--) {
    const e = s.enemies[i];
    e.y += e.spd;
    if (e.y > tw.y - 20) {
      s.lives -= e.maxHp * 0.4;
      spawnParticles(e.x, tw.y - 20, '#ff4444', 6);
      s.enemies.splice(i, 1);
      if (s.lives <= 0) { gameOver(); return; }
    }
  }

  updateUI();
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const s = state;
  const tw = s.tower;

  // Background grid (subtle)
  ctx.strokeStyle = '#0f0f1a';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Defense line
  ctx.strokeStyle = '#1e1e2e';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, tw.y - 22); ctx.lineTo(canvas.width, tw.y - 22); ctx.stroke();

  // Aura
  if (auraRange > 0) {
    const grad = ctx.createLinearGradient(0, tw.y - 22 - auraRange, 0, tw.y - 22);
    grad.addColorStop(0, 'rgba(150,50,255,0)');
    grad.addColorStop(1, 'rgba(150,50,255,0.12)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, tw.y - 22 - auraRange, canvas.width, auraRange);
    // aura edge line
    ctx.strokeStyle = 'rgba(150,50,255,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(0, tw.y - 22 - auraRange); ctx.lineTo(canvas.width, tw.y - 22 - auraRange); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Shot effects
  for (const ef of s.effects) {
    const alpha = ef.timer / 10;
    ctx.strokeStyle = ef.crit ? `rgba(255,200,0,${alpha})` : `rgba(100,180,255,${alpha})`;
    ctx.lineWidth = ef.crit ? 2 : 1;
    ctx.beginPath(); ctx.moveTo(ef.x1, ef.y1); ctx.lineTo(ef.x2, ef.y2); ctx.stroke();
  }

  // Particles
  for (const p of s.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Enemies
  for (const e of s.enemies) {
    const col = enemyColor(e.type);
    // body
    ctx.fillStyle = col;
    // pixel-art square enemy
    ctx.fillRect(e.x - e.size / 2, e.y - e.size / 2, e.size, e.size);
    // inner detail
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(e.x - e.size / 2 + 2, e.y - e.size / 2 + 2, e.size - 4, 3);
    // health bar
    const barW = e.size + 4;
    const hpRatio = e.hp / e.maxHp;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(e.x - barW / 2, e.y - e.size / 2 - 6, barW, 3);
    ctx.fillStyle = hpRatio > 0.5 ? '#40e080' : hpRatio > 0.25 ? '#e0c040' : '#e04040';
    ctx.fillRect(e.x - barW / 2, e.y - e.size / 2 - 6, barW * hpRatio, 3);
  }

  // Main tower
  drawTower(tw.x, tw.y, 18, '#4a9eff');

  // Mini towers
  if (s.miniR) drawTower(s.miniR.x, s.miniR.y, 10, '#2060a0');
  if (s.miniL) drawTower(s.miniL.x, s.miniL.y, 10, '#2060a0');

  // Wave pause countdown
  if (!s.waveActive && s.wavePauseTimer > 0) {
    const sec = Math.ceil(s.wavePauseTimer / 60);
    ctx.fillStyle = 'rgba(10,10,15,0.55)';
    ctx.fillRect(0, canvas.height / 2 - 30, canvas.width, 60);
    ctx.fillStyle = '#333';
    ctx.font = '11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(`WAVE ${s.wave} IN ${sec}s`, canvas.width / 2, canvas.height / 2 + 4);
    ctx.textAlign = 'left';
  }
}

function drawTower(x, y, r, color) {
  // Base platform
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(x - r - 4, y + r - 2, (r + 4) * 2, 8);
  // Tower body
  ctx.fillStyle = color;
  ctx.fillRect(x - r / 2, y - r, r, r * 1.5);
  // Tower top
  ctx.fillRect(x - r * 0.7, y - r - 4, r * 1.4, 6);
  // Barrel
  ctx.fillStyle = '#c0d8f8';
  ctx.fillRect(x - 2, y - r - 2, 4, -10);
  // Light dot
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(x - 2, y - r - 1, 3, 3);
}

// ─── WAVE SYSTEM ──────────────────────────────────────────────────────────────
function startWave(waveNum) {
  state.waveActive = true;
  const cfg = getWaveConfig(waveNum);
  state.waveEnemiesLeft = cfg.count;
  state.waveSpawnTimer = 0;

  // Announce
  const el = document.getElementById('wave-announce');
  el.textContent = `WAVE ${waveNum}`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return Math.floor(n).toString();
}

function getCritCost() {
  return 10 * state.critLv + state.critCostAdd;
}

function updateUI() {
  const s = state;
  document.getElementById('waveNum').textContent = s.wave;
  document.getElementById('livesDisp').textContent = Math.max(0, Math.floor(s.lives));
  document.getElementById('goldDisp').textContent = fmt(s.gold);

  const cfg = getWaveConfig(s.wave);
  // Wave bar – progress through pause
  if (!s.waveActive && s.wavePauseDuration > 0) {
    const pct = ((s.wavePauseDuration - s.wavePauseTimer) / s.wavePauseDuration) * 100;
    document.getElementById('wave-bar-fill').style.width = pct + '%';
    document.getElementById('wave-next').textContent = `Wave ${s.wave}: ${cfg.count} enemies`;
  } else {
    // During wave: show remaining enemies
    const total = cfg.count;
    const done = total - s.waveEnemiesLeft;
    const pct = (done / total) * 100;
    document.getElementById('wave-bar-fill').style.width = pct + '%';
    document.getElementById('wave-next').textContent = `${s.waveEnemiesLeft} left`;
  }

  // Buttons affordable highlight
  const btns = [
    ['btn-speed', 'info-speed', `Lv ${s.speedLv} · Cost ${fmt(s.speedCost)}`, s.speedCost],
    ['btn-dmg',   'info-dmg',   `Lv ${s.dmgLv} · Cost ${fmt(s.dmgCost)}`, s.dmgCost],
    ['btn-gold',  'info-gold',  `Lv ${goldMultLv} · Cost ${fmt(goldMultCost)}`, goldMultCost],
    ['btn-crit',  'info-crit',  `Lv ${s.critLv} · Cost ${fmt(getCritCost())}`, getCritCost()],
    ['btn-regen', 'info-regen', `Lv ${regenLv} · Cost ${fmt(regenCost)}`, regenCost],
    ['btn-aura-range', 'info-aura-range', `Range ${auraRange}px · Cost ${fmt(auraRangeCost)}`, auraRangeCost],
    ['btn-aura-dmg',   'info-aura-dmg',   `Dmg ${auraDmg}/s · Cost ${fmt(auraDmgCost)}`, auraDmgCost],
  ];
  for (const [btnId, infoId, text, cost] of btns) {
    document.getElementById(infoId).textContent = text;
    const btn = document.getElementById(btnId);
    if (!btn.disabled) {
      btn.classList.toggle('affordable', s.gold >= cost);
    }
  }
}

// ─── UPGRADES ─────────────────────────────────────────────────────────────────
document.getElementById('btn-speed').onclick = () => {
  if (state.gold < state.speedCost) return;
  state.gold -= state.speedCost;
  state.speedLv++;
  state.tower.shootInterval = Math.max(15, state.tower.shootInterval - 2);
  state.speedCost = state.speedLv < 30
    ? Math.floor(state.speedCost * (1 + 0.12 * Math.floor(state.speedLv / 10 + 1)) + 10)
    : state.speedCost + 1200;
};
document.getElementById('btn-dmg').onclick = () => {
  if (state.gold < state.dmgCost) return;
  state.gold -= state.dmgCost;
  state.dmgLv++;
  state.tower.dmg += 5;
  state.dmgCost = state.dmgLv < 30
    ? Math.floor(state.dmgCost * (1 + 0.12 * Math.floor(state.dmgLv / 10 + 1)) + 10)
    : state.dmgCost + 1200;
};
document.getElementById('btn-gold').onclick = () => {
  if (state.gold < goldMultCost) return;
  state.gold -= goldMultCost;
  goldMultLv++; goldMult += 0.1; goldMultCost = Math.floor(goldMultCost * 3);
};
document.getElementById('btn-crit').onclick = () => {
  const cost = getCritCost();
  if (state.gold < cost || state.tower.critChance >= 1) return;
  state.gold -= cost;
  state.critLv++;
  state.tower.critChance = Math.min(1, state.tower.critChance + 0.01);
  if (state.critLv >= 15 && state.critLv % 5 === 0) state.critCostAdd += 2;
};
document.getElementById('btn-regen').onclick = () => {
  if (state.gold < regenCost) return;
  state.gold -= regenCost;
  regenLv++; regenRate += 0.1; regenCost = Math.floor(regenCost + 250 * 1.5 + 100);
};
document.getElementById('btn-aura-range').onclick = () => {
  if (state.gold < auraRangeCost || state.wave < 3) return;
  state.gold -= auraRangeCost;
  auraRange = auraRange === 0 ? 50 : Math.min(auraRange + 50, canvas.height * 0.75);
  auraRangeCost = Math.floor(auraRangeCost * 2.5);
};
document.getElementById('btn-aura-dmg').onclick = () => {
  if (state.gold < auraDmgCost || state.wave < 3) return;
  state.gold -= auraDmgCost;
  auraDmg += 5; auraDmgCost = Math.floor(auraDmgCost * 2);
};

// ─── GAME OVER ────────────────────────────────────────────────────────────────
function gameOver() {
  running = false;
  if (animId) cancelAnimationFrame(animId);
  document.getElementById('gameover-info').textContent = `wave ${state.wave} · ${state.kills} kills`;
  document.getElementById('gameover').classList.add('show');
}

function restartGame() {
  document.getElementById('gameover').classList.remove('show');
  // Reset persistent upgrades
  goldMultLv = 0; goldMultCost = 10; goldMult = 1;
  regenLv = 0; regenCost = 250; regenRate = 0.1;
  auraRange = 0; auraRangeCost = 1000;
  auraDmg = 0; auraDmgCost = 750;
  startGame();
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop() {
  if (!running) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

function startGame() {
  running = true;
  state = initState();
  // Start first wave after short pause
  state.wavePauseTimer = 180; // 3s
  updateUI();
  loop();
}
</script>
</body>
</html>
