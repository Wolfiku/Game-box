<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crossy Road</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#87CEEB;font-family:'Segoe UI',sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}
#game-container{position:fixed;inset:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;z-index:20;pointer-events:none}
#counter{font-size:28px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);letter-spacing:.05em}
#darkMode{pointer-events:auto;background:rgba(0,0,0,.3);border:none;color:#fff;font-size:13px;padding:6px 12px;border-radius:20px;cursor:pointer;letter-spacing:.08em;backdrop-filter:blur(4px)}
#darkMode:hover{background:rgba(0,0,0,.5)}
#end{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.72);
  z-index:30;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:20px;
}
#end.visible{display:flex}
#end h2{color:#fff;font-size:clamp(1.8rem,6vw,3rem);letter-spacing:.1em;text-align:center}
#end p{color:rgba(255,255,255,.6);font-size:14px;letter-spacing:.12em}
#retry{padding:12px 32px;font-size:15px;letter-spacing:.15em;text-transform:uppercase;background:#fff;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:600}
#retry:hover{background:#eee}
#controls{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:grid;
  grid-template-columns:repeat(3,52px);
  grid-template-rows:repeat(2,52px);
  gap:6px;
  z-index:20;
}
#controls button{
  width:52px;height:52px;
  background:rgba(255,255,255,.25);
  border:2px solid rgba(255,255,255,.45);
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
}
#controls button:active{background:rgba(255,255,255,.45)}
#forward{grid-column:2;grid-row:1}
#left{grid-column:1;grid-row:2}
#backward{grid-column:2;grid-row:2}
#right{grid-column:3;grid-row:2}
</style>
</head>
<body>

<div id="game-container"></div>

<div id="hud">
  <div id="counter">0</div>
  <button id="darkMode">🌙 Dark</button>
</div>

<div id="end">
  <h2>GAME OVER</h2>
  <p>Du hast es nicht geschafft!</p>
  <button id="retry">Nochmal</button>
</div>

<div id="controls">
  <button id="forward">▲</button>
  <button id="left">◀</button>
  <button id="backward">▼</button>
  <button id="right">▶</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>

<script>
// Swipe-Steuerung
(function() {
  var touchStartX = 0;
  var touchStartY = 0;
  var swipeThreshold = 35; // Mindest-Pixel fuer einen Swipe
  var moved = false;

  document.addEventListener('touchstart', function(e) {
    // Nur wenn kein Button getroffen wurde
    if (e.target.closest('#controls, #retry, #darkMode')) return;
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
    moved = false;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (e.target.closest('#controls, #retry, #darkMode')) return;
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    if (!moved && (Math.abs(dx) > swipeThreshold || Math.abs(dy) > swipeThreshold)) {
      moved = true;
      if (Math.abs(dx) > Math.abs(dy)) {
        // Horizontal
        if (dx > 0) {
          document.getElementById('right').click();
        } else {
          document.getElementById('left').click();
        }
      } else {
        // Vertikal (Swipe hoch = forward, runter = backward)
        if (dy < 0) {
          document.getElementById('forward').click();
        } else {
          document.getElementById('backward').click();
        }
      }
    }
  }, { passive: true });
})();
</script>

</body>
</html>
