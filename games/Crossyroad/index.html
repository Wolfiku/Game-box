<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crossy Road</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;-webkit-user-select:none;user-select:none;background:#87CEEB}

/* ── Screens ── */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:50;transition:opacity .25s ease}
.screen.hidden{opacity:0;pointer-events:none}

/* ── Start Menu ── */
#screen-menu{background:linear-gradient(160deg,#5bc8f5 0%,#87CEEB 100%)}
#menu-title{font-size:clamp(2.2rem,10vw,4rem);font-weight:900;color:#fff;text-shadow:0 4px 18px rgba(0,0,0,.25);letter-spacing:.08em}
#menu-subtitle{font-size:13px;color:rgba(255,255,255,.7);letter-spacing:.2em;text-transform:uppercase;margin-top:-10px}
.menu-btn{padding:13px 38px;font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:none;border-radius:30px;cursor:pointer;transition:.15s ease;min-width:200px}
#btn-play{background:#fff;color:#333;box-shadow:0 4px 20px rgba(0,0,0,.18)}
#btn-play:hover{background:#f0f0f0;transform:scale(1.03)}
#btn-settings-open{background:rgba(255,255,255,.22);color:#fff;border:2px solid rgba(255,255,255,.5)}
#btn-settings-open:hover{background:rgba(255,255,255,.35)}
#menu-highscore{font-size:13px;color:rgba(255,255,255,.75);letter-spacing:.12em}

/* ── Settings Screen ── */
#screen-settings{background:rgba(0,0,0,.88);gap:24px}
#settings-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:.15em;text-transform:uppercase}
.settings-group{display:flex;flex-direction:column;gap:10px;width:min(320px,88vw)}
.settings-label{font-size:11px;letter-spacing:.22em;color:rgba(255,255,255,.45);text-transform:uppercase}
.theme-buttons{display:flex;gap:8px}
.theme-btn{
  flex:1;padding:10px 6px;border:2px solid rgba(255,255,255,.2);
  border-radius:10px;background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.6);font-size:13px;font-weight:600;
  cursor:pointer;transition:.15s ease;letter-spacing:.05em;
}
.theme-btn:hover{background:rgba(255,255,255,.14);color:#fff}
.theme-btn.active{border-color:#fff;background:rgba(255,255,255,.18);color:#fff}
#btn-settings-close{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:8px 28px;font-size:13px;cursor:pointer;letter-spacing:.1em;margin-top:6px}
#btn-settings-close:hover{background:rgba(255,255,255,.22)}

/* ── Game HUD ── */
#game-container{position:fixed;inset:0;width:100%;height:100%;z-index:1}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px;z-index:20;pointer-events:none}
#counter{font-size:30px;font-weight:800;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.5)}
#hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
#highscore-label{font-size:10px;letter-spacing:.18em;color:rgba(255,255,255,.6);text-transform:uppercase}
#highscore-display{font-size:18px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4)}

/* ── Controls ── */
#controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(2,54px);gap:6px;z-index:20}
#controls button{width:54px;height:54px;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.4);border-radius:12px;color:#fff;font-size:22px;cursor:pointer;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;transition:.1s ease;pointer-events:auto}
#controls button:active{background:rgba(255,255,255,.45);transform:scale(.93)}
#forward{grid-column:2;grid-row:1}
#left{grid-column:1;grid-row:2}
#backward{grid-column:2;grid-row:2}
#right{grid-column:3;grid-row:2}

/* ── Game Over ── */
#screen-end{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:40;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;opacity:0;pointer-events:none;transition:opacity .25s ease}
#screen-end.visible{opacity:1;pointer-events:auto}
#end-title{color:#fff;font-size:clamp(2rem,7vw,3.2rem);font-weight:900;letter-spacing:.1em}
#end-score{font-size:16px;color:rgba(255,255,255,.65);letter-spacing:.15em}
#end-highscore{font-size:15px;color:#ffd700;letter-spacing:.12em;font-weight:700}
.end-btn{padding:12px 36px;font-size:14px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border:none;border-radius:26px;cursor:pointer;transition:.15s ease}
#btn-retry{background:#fff;color:#222;margin-top:4px}
#btn-retry:hover{background:#eee;transform:scale(1.03)}
#btn-menu{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.35)}
#btn-menu:hover{background:rgba(255,255,255,.28)}
</style>
</head>
<body>

<!-- START MENU -->
<div id="screen-menu" class="screen">
  <div id="menu-title">CROSSY ROAD</div>
  <div id="menu-subtitle">Hop across!</div>
  <div id="menu-highscore">🏆 Highscore: <span id="menu-hs-val">0</span></div>
  <button class="menu-btn" id="btn-play">▶️  Spielen</button>
  <button class="menu-btn" id="btn-settings-open">⚙️  Einstellungen</button>
</div>

<!-- SETTINGS -->
<div id="screen-settings" class="screen hidden">
  <div id="settings-title">Einstellungen</div>
  <div class="settings-group">
    <div class="settings-label">Thema</div>
    <div class="theme-buttons">
      <button class="theme-btn" id="theme-white">☀️ Hell</button>
      <button class="theme-btn" id="theme-dark">🌙 Dunkel</button>
      <button class="theme-btn" id="theme-time">🕒 Zeit</button>
    </div>
  </div>
  <button id="btn-settings-close">← Zurück</button>
</div>

<!-- GAME -->
<div id="game-container"></div>
<div id="hud" style="display:none">
  <div id="counter">0</div>
  <div id="hud-right">
    <div id="highscore-label">Highscore</div>
    <div id="highscore-display">0</div>
  </div>
</div>
<div id="controls" style="display:none">
  <button id="forward">▲</button>
  <button id="left">◀</button>
  <button id="backward">▼</button>
  <button id="right">▶</button>
</div>

<!-- GAME OVER -->
<div id="screen-end">
  <div id="end-title">GAME OVER</div>
  <div id="end-score">Score: <span id="end-score-val">0</span></div>
  <div id="end-highscore">🏆 Highscore: <span id="end-hs-val">0</span></div>
  <button class="end-btn" id="btn-retry">Nochmal</button>
  <button class="end-btn" id="btn-menu">Menü</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
